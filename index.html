<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG Advanced</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
canvas { display:block; margin:auto; background:#0f0f1a; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 1100;
canvas.height = 650;

let state="lobby";
let keys={}, mouse={x:0,y:0,clicked:false};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);
canvas.addEventListener("mousemove",e=>{
let r=canvas.getBoundingClientRect();
mouse.x=e.clientX-r.left;
mouse.y=e.clientY-r.top;
});
canvas.addEventListener("mousedown",()=>mouse.clicked=true);

/* ================= RARITY ================= */

const rarityColors={
common:"white",
rare:"cyan",
epic:"purple",
legendary:"orange"
};

/* ================= PLAYER ================= */

const player={
x:550,y:500,
hp:100,maxHp:100,
speed:4,
damage:15,
baseDefense:2,
iframe:0,
slashCooldown:0,
direction:0,
anim:0,
inventory:[],
equipment:{weapon:null,armor:null}
};

/* ================= DUNGEONS ================= */

const dungeons=[
{name:"Caverna Verde",difficulty:1},
{name:"Templo Sombrio",difficulty:2},
{name:"Abismo Infernal",difficulty:3}
];

let selectedDungeon=null;
let enemies=[], boss=null;

/* ================= HELPERS ================= */

function rand(min,max){return Math.random()*(max-min)+min;}
function dist(a,b,c,d){return Math.hypot(a-c,b-d);}

function getDefense(){
let armorDef = player.equipment.armor ? player.equipment.armor.defense : 0;
return player.baseDefense + armorDef;
}

function calculateDamage(incoming){
let reduced = incoming - (getDefense()*0.6);
return Math.max(1,Math.floor(reduced));
}

/* ================= START DUNGEON ================= */

function startDungeon(d){
selectedDungeon=d;
state="dungeon";
enemies=[];
boss=null;

for(let i=0;i<5*d.difficulty;i++){
enemies.push({
x:rand(200,900),
y:rand(100,400),
hp:40*d.difficulty,
damage:8*d.difficulty,
type: Math.random()>0.5?"melee":"ranged",
cool:120
});
}
}

/* ================= SPAWN BOSS ================= */

function spawnBoss(){
boss={
name:"Guardião "+selectedDungeon.name,
x:550,y:150,
hp:300*selectedDungeon.difficulty,
maxHp:300*selectedDungeon.difficulty,
damage:15*selectedDungeon.difficulty,
dashCooldown:180,
dashAnim:0
};
}

/* ================= UPDATE ================= */

function update(){

if(state==="dungeon"){
movePlayer();
updateEnemies();
updateBoss();
}

if(player.iframe>0) player.iframe--;
if(player.slashCooldown>0) player.slashCooldown--;
}

/* ================= PLAYER ================= */

function movePlayer(){
let dx=0,dy=0;
if(keys["w"])dy--;
if(keys["s"])dy++;
if(keys["a"])dx--;
if(keys["d"])dx++;

if(dx||dy){
let len=Math.hypot(dx,dy);
dx/=len; dy/=len;
player.x+=dx*player.speed;
player.y+=dy*player.speed;
player.direction=Math.atan2(dy,dx);
player.anim+=0.2;
}

if(keys[" "]) attack();
}

function attack(){
if(player.slashCooldown>0)return;
player.slashCooldown=20;

enemies.forEach(e=>{
if(dist(player.x,player.y,e.x,e.y)<80){
e.hp-=getPlayerDamage();
}
});

if(boss && dist(player.x,player.y,boss.x,boss.y)<100){
boss.hp-=getPlayerDamage();
}
}

function getPlayerDamage(){
let base=player.damage;
if(player.equipment.weapon) base+=player.equipment.weapon.power;
return base;
}

/* ================= ENEMIES ================= */

function updateEnemies(){
enemies=enemies.filter(e=>{
if(e.hp<=0)return false;

let d=dist(player.x,player.y,e.x,e.y);

if(e.type==="melee"){
e.x+=(player.x-e.x)/d*1.5;
e.y+=(player.y-e.y)/d*1.5;
if(d<30) damagePlayer(e.damage);
}
if(e.type==="ranged"){
e.cool--;
if(e.cool<=0){
damagePlayer(e.damage);
e.cool=120;
}
}
return true;
});

if(enemies.length===0 && !boss){
spawnBoss();
}
}

/* ================= BOSS ================= */

function updateBoss(){
if(!boss)return;

let d=dist(player.x,player.y,boss.x,boss.y);

boss.x+=(player.x-boss.x)/d*0.8;
boss.y+=(player.y-boss.y)/d*0.8;

boss.dashCooldown--;
if(boss.dashCooldown<=0){
boss.dashAnim=20;
boss.x+=(player.x-boss.x)/d*80;
boss.y+=(player.y-boss.y)/d*80;
boss.dashCooldown=200;
}

if(d<40) damagePlayer(boss.damage);

if(boss.hp<=0){
giveLoot();
state="lobby";
}
}

/* ================= DAMAGE ================= */

function damagePlayer(amount){
if(player.iframe>0)return;
let finalDamage=calculateDamage(amount);
player.hp-=finalDamage;
player.iframe=30;
}

/* ================= LOOT ================= */

function giveLoot(){
let rarities=["common","rare","epic","legendary"];
let r=rarities[Math.floor(Math.random()*rarities.length)];

if(Math.random()>0.5){
player.inventory.push({
type:"weapon",
power:rand(5,20)*selectedDungeon.difficulty,
rarity:r
});
}else{
player.inventory.push({
type:"armor",
defense:rand(3,10)*selectedDungeon.difficulty,
rarity:r
});
}
}

/* ================= DRAW ================= */

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="lobby"){
drawLobby();
}
if(state==="dungeon"){
drawDungeon();
}
}

function drawLobby(){
ctx.fillStyle="white";
ctx.fillText("Escolha sua Dungeon:",450,150);

dungeons.forEach((d,i)=>{
ctx.fillStyle="gray";
ctx.fillRect(400,200+i*70,300,50);
ctx.fillStyle="white";
ctx.fillText(d.name,470,230+i*70);

if(mouse.clicked){
if(mouse.x>400 && mouse.x<700 &&
mouse.y>200+i*70 && mouse.y<250+i*70){
startDungeon(d);
}
}
});
mouse.clicked=false;
}

function drawDungeon(){

// player
ctx.fillStyle=player.iframe>0?"red":"cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,20+Math.sin(player.anim)*2,0,Math.PI*2);
ctx.fill();

// enemies
enemies.forEach(e=>{
ctx.fillStyle=e.type==="melee"?"crimson":"yellow";
ctx.beginPath();
ctx.arc(e.x,e.y,15,0,Math.PI*2);
ctx.fill();
});

// boss
if(boss){
ctx.fillStyle=boss.dashAnim>0?"orange":"purple";
ctx.beginPath();
ctx.arc(boss.x,boss.y,40,0,Math.PI*2);
ctx.fill();

// life bar
ctx.fillStyle="black";
ctx.fillRect(300,20,500,25);
ctx.fillStyle="red";
ctx.fillRect(300,20,500*(boss.hp/boss.maxHp),25);
ctx.fillStyle="white";
ctx.fillText(boss.name,480,15);
}
}

/* ================= LOOP ================= */

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
