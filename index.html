<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG Avançado - Versão Funcional</title>
<style>
body { 
margin:0; 
overflow:hidden; 
background:#111; 
font-family:Arial, sans-serif; 
}
canvas { 
display:block; 
margin:auto; 
background: #1a1f2a;
border: 2px solid #333;
}
</style>
</head>
<body>
<canvas id="game" width="1100" height="650"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ================= ESTADO DO JOGO =================
let estado = "lobby";
let teclas = {};
let mouse = {x: 0, y: 0, clicado: false};
let particulas = [];
let numerosFlutuantes = [];
let inimigos = [];
let chefe = null;
let masmorraSelecionada = null;
let mensagem = "";
let tempoMensagem = 0;

// ================= JOGADOR =================
let jogador = {
    x: 550,
    y: 500,
    hp: 100,
    maxHp: 100,
    xp: 0,
    nivel: 1,
    ouro: 100,
    velocidade: 5,
    dano: 15,
    defesa: 3,
    iframe: 0,
    slashCooldown: 0,
    direcao: 0,
    animacao: 0,
    pocoes: 3,
    inventario: [],
    equipamento: [null, null, null, null], // arma, armadura, amuleto, anel
    forca: 5,
    agilidade: 5,
    constituicao: 5,
    habilidades: {
        dash: false,
        dashCooldown: 0
    }
};

// ================= SKILL TREE =================
let skillTree = {
    forca: { nivel: 0, max: 5, desc: "+2 de dano" },
    agilidade: { nivel: 0, max: 5, desc: "+2% de crítico" },
    constituicao: { nivel: 0, max: 5, desc: "+5 de HP" },
    velocidade: { nivel: 0, max: 5, desc: "+0.5 de velocidade" }
};
let skillPoints = 0;

// ================= QUESTS =================
let quests = [
    { nome: "Aprendiz", desc: "Mate 5 inimigos", progresso: 0, meta: 5, completa: false, recompensa: "dash" },
    { nome: "Caçador", desc: "Derrote 1 chefe", progresso: 0, meta: 1, completa: false, recompensa: "ouro" }
];

// ================= MASMORRAS =================
let masmorras = [
    { nome: "🌿 Caverna Verde", dificuldade: 1, cor: "#4caf50", inimigos: 3 },
    { nome: "🌑 Templo Sombrio", dificuldade: 2, cor: "#9c27b0", inimigos: 5 },
    { nome: "🔥 Abismo Infernal", dificuldade: 3, cor: "#f44336", inimigos: 7 },
    { nome: "❄️ Pico Gelado", dificuldade: 4, cor: "#00bcd4", inimigos: 9 },
    { nome: "⚡ Torre da Tempestade", dificuldade: 5, cor: "#ffc107", inimigos: 12 }
];

// ================= EFEITOS DOS ITENS =================
let efeitosItens = [
    { nome: "Flamante", cor: "#ff5500", bonus: 5, tipo: "dano" },
    { nome: "Gélido", cor: "#00ccff", bonus: 3, tipo: "defesa" },
    { nome: "Vampírico", cor: "#aa0000", bonus: 10, tipo: "vida" },
    { nome: "Celestial", cor: "#ffffaa", bonus: 20, tipo: "xp" }
];

// ================= RARIDADES =================
let raridades = {
    comum: { cor: "#a0a0a0", mult: 1 },
    raro: { cor: "#4a9eff", mult: 1.5 },
    epico: { cor: "#b87cff", mult: 2 },
    lendario: { cor: "#ffaa33", mult: 3 }
};

// ================= EVENTOS =================
window.addEventListener("keydown", (e) => teclas[e.key] = true);
window.addEventListener("keyup", (e) => teclas[e.key] = false);

canvas.addEventListener("mousemove", (e) => {
    let rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

canvas.addEventListener("mousedown", () => mouse.clicado = true);
canvas.addEventListener("mouseup", () => mouse.clicado = false);
canvas.addEventListener("contextmenu", (e) => e.preventDefault());

// ================= FUNÇÕES =================
function aleatorio(min, max) {
    return Math.random() * (max - min) + min;
}

function aleatorioInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function distancia(x1, y1, x2, y2) {
    return Math.hypot(x1 - x2, y1 - y2);
}

function criarMensagem(texto, cor = "#fff") {
    mensagem = texto;
    tempoMensagem = 120;
}

function criarParticula(x, y, cor, tamanho = 3) {
    for (let i = 0; i < 3; i++) {
        particulas.push({
            x: x + aleatorio(-5, 5),
            y: y + aleatorio(-5, 5),
            cor: cor,
            tamanho: tamanho * aleatorio(0.5, 1.5),
            vx: aleatorio(-2, 2),
            vy: aleatorio(-2, 2),
            vida: 20
        });
    }
}

function criarNumero(x, y, texto, cor = "#fff") {
    numerosFlutuantes.push({
        x: x,
        y: y,
        texto: texto,
        cor: cor,
        vy: -1,
        vida: 40
    });
}

function getDanoJogador() {
    let danoBase = jogador.dano + (jogador.nivel * 2) + (jogador.forca * 2);
    let arma = jogador.equipamento[0];
    if (arma) danoBase += arma.poder;
    return Math.floor(danoBase);
}

function getDefesaJogador() {
    let defesaBase = jogador.defesa + (jogador.constituicao * 1);
    let armadura = jogador.equipamento[1];
    if (armadura) defesaBase += armadura.poder;
    return defesaBase;
}

function getVelocidadeJogador() {
    return jogador.velocidade + (skillTree.velocidade.nivel * 0.5);
}

function atacar() {
    if (jogador.slashCooldown > 0) return;
    jogador.slashCooldown = 15;

    let dano = getDanoJogador();
    let corArma = "#ffffff";
    let arma = jogador.equipamento[0];
    if (arma) corArma = arma.corEfeito || raridades[arma.raridade].cor;

    // Criar slash
    for (let i = 0; i < 5; i++) {
        criarParticula(jogador.x + Math.cos(jogador.direcao) * 40, jogador.y + Math.sin(jogador.direcao) * 40, corArma, 8);
    }

    // Acertar inimigos
    inimigos.forEach(i => {
        if (distancia(jogador.x, jogador.y, i.x, i.y) < 80) {
            i.hp -= dano;
            criarNumero(i.x, i.y - 20, `-${dano}`, "#ff5555");
            criarParticula(i.x, i.y, "#ff0000", 5);
        }
    });

    // Acertar chefe
    if (chefe && distancia(jogador.x, jogador.y, chefe.x, chefe.y) < 100) {
        chefe.hp -= dano;
        criarNumero(chefe.x, chefe.y - 30, `-${dano}`, "#ffaa00");
        criarParticula(chefe.x, chefe.y, "#ffaa00", 8);
    }
}

function usarPocao() {
    if (jogador.pocoes <= 0) return;
    jogador.pocoes--;
    jogador.hp = Math.min(jogador.maxHp, jogador.hp + 50);
    criarMensagem("Poção usada! +50 HP", "#4caf50");
    criarParticula(jogador.x, jogador.y, "#4caf50", 10);
}

function usarDash() {
    if (!jogador.habilidades.dash || jogador.habilidades.dashCooldown > 0) return;
    
    let dx = Math.cos(jogador.direcao) * 150;
    let dy = Math.sin(jogador.direcao) * 150;
    jogador.x += dx;
    jogador.y += dy;
    jogador.habilidades.dashCooldown = 120;
    criarMensagem("Dash!", "#00ffff");
    for (let i = 0; i < 10; i++) {
        criarParticula(jogador.x, jogador.y, "#00ffff", 5);
    }
}

function iniciarMasmorra(m) {
    masmorraSelecionada = m;
    estado = "dungeon";
    inimigos = [];
    chefe = null;
    
    // Centralizar jogador
    jogador.x = canvas.width / 2;
    jogador.y = canvas.height / 2;
    
    // Criar inimigos
    for (let i = 0; i < m.inimigos; i++) {
        inimigos.push({
            x: aleatorio(200, 900),
            y: aleatorio(100, 500),
            hp: 30 + (m.dificuldade * 10),
            maxHp: 30 + (m.dificuldade * 10),
            dano: 5 + (m.dificuldade * 2),
            tipo: Math.random() > 0.5 ? "melee" : "ranged",
            cor: m.cor,
            xp: 10 * m.dificuldade
        });
    }
    
    criarMensagem(`Entrou em ${m.nome}`, m.cor);
}

function criarChefe() {
    if (!masmorraSelecionada) return;
    
    chefe = {
        nome: "Guardião " + masmorraSelecionada.nome,
        x: aleatorio(400, 700),
        y: 200,
        hp: 200 * masmorraSelecionada.dificuldade,
        maxHp: 200 * masmorraSelecionada.dificuldade,
        dano: 15 * masmorraSelecionada.dificuldade,
        cor: masmorraSelecionada.cor
    };
    
    criarMensagem("CHEFE APARECEU!", "#ff5500");
    criarParticula(chefe.x, chefe.y, "#ff5500", 20);
}

function gerarItem() {
    let raridadeNomes = ["comum", "raro", "epico", "lendario"];
    let raridade = raridadeNomes[Math.floor(Math.random() * raridadeNomes.length)];
    let tipo = Math.random() > 0.5 ? "arma" : "armadura";
    
    let item = {
        tipo: tipo,
        poder: aleatorioInt(5, 15) * raridades[raridade].mult,
        raridade: raridade,
        nome: (tipo === "arma" ? "Espada " : "Armadura ") + raridade
    };
    
    // 30% de chance de ter efeito
    if (Math.random() < 0.3) {
        let efeito = efeitosItens[Math.floor(Math.random() * efeitosItens.length)];
        item.efeito = efeito.nome;
        item.corEfeito = efeito.cor;
        item.nome = efeito.nome + " " + item.nome;
    }
    
    return item;
}

function equiparItem(index) {
    let item = jogador.inventario[index];
    if (!item) return;
    
    let slot = item.tipo === "arma" ? 0 : 1;
    
    // Devolver item atual
    if (jogador.equipamento[slot]) {
        jogador.inventario.push(jogador.equipamento[slot]);
    }
    
    jogador.equipamento[slot] = item;
    jogador.inventario.splice(index, 1);
    criarMensagem(`${item.nome} equipado!`, item.corEfeito || raridades[item.raridade].cor);
}

function atualizarQuests(tipo) {
    quests.forEach(q => {
        if (!q.completa && q.desc.includes(tipo)) {
            q.progresso++;
            if (q.progresso >= q.meta) {
                q.completa = true;
                if (q.recompensa === "dash") {
                    jogador.habilidades.dash = true;
                    criarMensagem("DASH DESBLOQUEADO!", "#00ffff");
                } else {
                    jogador.ouro += 100;
                    criarMensagem("Quest completa! +100 ouro", "#ffd700");
                }
            }
        }
    });
}

function comprarSkill(skill) {
    if (skillPoints <= 0) return;
    let s = skillTree[skill];
    if (s.nivel < s.max) {
        s.nivel++;
        skillPoints--;
        criarMensagem(`${skill} +1`, "#4aff4a");
    }
}

// ================= UPDATE =================
function update() {
    if (estado === "lobby") {
        // Nada por enquanto
    }
    
    if (estado === "dungeon") {
        // Movimento do jogador
        let dx = 0, dy = 0;
        if (teclas["w"] || teclas["ArrowUp"]) dy--;
        if (teclas["s"] || teclas["ArrowDown"]) dy++;
        if (teclas["a"] || teclas["ArrowLeft"]) dx--;
        if (teclas["d"] || teclas["ArrowRight"]) dx++;
        
        if (dx !== 0 || dy !== 0) {
            let len = Math.hypot(dx, dy);
            dx /= len;
            dy /= len;
            jogador.x += dx * getVelocidadeJogador();
            jogador.y += dy * getVelocidadeJogador();
            jogador.direcao = Math.atan2(dy, dx);
            jogador.animacao += 0.1;
        }
        
        // Limites
        jogador.x = Math.max(50, Math.min(1050, jogador.x));
        jogador.y = Math.max(50, Math.min(600, jogador.y));
        
        // Ataque
        if (teclas[" "]) atacar();
        
        // Poção
        if (teclas["q"]) usarPocao();
        
        // Dash
        if (teclas["Shift"]) usarDash();
        
        // Cooldowns
        if (jogador.slashCooldown > 0) jogador.slashCooldown--;
        if (jogador.habilidades.dashCooldown > 0) jogador.habilidades.dashCooldown--;
        
        // Atualizar inimigos
        inimigos = inimigos.filter(i => {
            if (i.hp <= 0) {
                jogador.xp += i.xp;
                jogador.ouro += aleatorioInt(5, 10);
                atualizarQuests("inimigos");
                criarParticula(i.x, i.y, i.cor, 10);
                return false;
            }
            
            // Movimento do inimigo
            let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
            i.x += Math.cos(ang) * 1;
            i.y += Math.sin(ang) * 1;
            
            // Dano ao jogador
            if (distancia(jogador.x, jogador.y, i.x, i.y) < 30 && jogador.iframe === 0) {
                let dano = Math.max(1, i.dano - getDefesaJogador() / 2);
                jogador.hp -= dano;
                jogador.iframe = 30;
                criarNumero(jogador.x, jogador.y - 20, `-${dano}`, "#ff0000");
                criarParticula(jogador.x, jogador.y, "#ff0000", 8);
            }
            
            return true;
        });
        
        // Atualizar chefe
        if (chefe) {
            if (chefe.hp <= 0) {
                jogador.xp += 100 * masmorraSelecionada.dificuldade;
                jogador.ouro += 100 * masmorraSelecionada.dificuldade;
                atualizarQuests("chefe");
                criarMensagem("CHEFE DERROTADO!", "#ffd700");
                criarParticula(chefe.x, chefe.y, "#ffd700", 30);
                
                // Dar item
                for (let i = 0; i < 2; i++) {
                    jogador.inventario.push(gerarItem());
                }
                
                chefe = null;
                estado = "lobby";
            }
            
            // Movimento do chefe
            let ang = Math.atan2(jogador.y - chefe.y, jogador.x - chefe.x);
            chefe.x += Math.cos(ang) * 0.8;
            chefe.y += Math.sin(ang) * 0.8;
            
            // Dano do chefe
            if (distancia(jogador.x, jogador.y, chefe.x, chefe.y) < 50 && jogador.iframe === 0) {
                let dano = Math.max(1, chefe.dano - getDefesaJogador() / 2);
                jogador.hp -= dano;
                jogador.iframe = 30;
                criarNumero(jogador.x, jogador.y - 20, `-${dano}`, "#ff0000");
            }
        }
        
        // Spawnar chefe quando inimigos acabam
        if (inimigos.length === 0 && !chefe) {
            criarChefe();
        }
        
        // Verificar morte do jogador
        if (jogador.hp <= 0) {
            jogador.hp = jogador.maxHp;
            estado = "lobby";
            criarMensagem("Você morreu...", "#ff0000");
        }
    }
    
    // Iframe
    if (jogador.iframe > 0) jogador.iframe--;
    
    // Atualizar partículas
    particulas = particulas.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vida--;
        return p.vida > 0;
    });
    
    // Atualizar números
    numerosFlutuantes = numerosFlutuantes.filter(n => {
        n.y += n.vy;
        n.vida--;
        return n.vida > 0;
    });
    
    // Mensagem
    if (tempoMensagem > 0) tempoMensagem--;
}

// ================= DRAW =================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (estado === "lobby") {
        drawLobby();
    } else {
        drawDungeon();
    }
    
    drawUI();
}

function drawLobby() {
    // Fundo
    ctx.fillStyle = "#2a2f3f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Título
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 40px Arial";
    ctx.fillText("⚔️ RPG DAS MASMORRAS ⚔️", 250, 60);
    
    // Card do jogador
    ctx.fillStyle = "#1a1f2a";
    ctx.fillRect(30, 80, 300, 250);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 20px Arial";
    ctx.fillText("JOGADOR", 120, 110);
    ctx.font = "16px Arial";
    ctx.fillText(`❤️ HP: ${jogador.hp}/${jogador.maxHp}`, 50, 150);
    ctx.fillText(`📊 Nível: ${jogador.nivel}`, 50, 180);
    ctx.fillText(`✨ XP: ${jogador.xp}/${jogador.nivel * 100}`, 50, 210);
    ctx.fillText(`🪙 Ouro: ${jogador.ouro}`, 50, 240);
    ctx.fillText(`⚔️ Dano: ${getDanoJogador()}`, 50, 270);
    ctx.fillText(`🛡️ Defesa: ${getDefesaJogador()}`, 50, 300);
    
    // Slots de equipamento
    ctx.fillStyle = "#1a1f2a";
    ctx.fillRect(30, 340, 300, 80);
    ctx.fillStyle = "#ffffff";
    ctx.font = "14px Arial";
    ctx.fillText("EQUIPAMENTOS", 130, 330);
    
    for (let i = 0; i < 4; i++) {
        let x = 40 + i * 75;
        ctx.fillStyle = "#333";
        ctx.fillRect(x, 350, 60, 60);
        if (jogador.equipamento[i]) {
            let item = jogador.equipamento[i];
            ctx.fillStyle = item.corEfeito || raridades[item.raridade].cor;
            ctx.font = "10px Arial";
            ctx.fillText(item.nome.substring(0, 6), x + 5, 420);
        }
    }
    
    // Skill Tree
    ctx.fillStyle = "#1a1f2a";
    ctx.fillRect(350, 80, 300, 300);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 18px Arial";
    ctx.fillText("SKILL TREE", 430, 110);
    ctx.font = "14px Arial";
    ctx.fillText(`Pontos: ${skillPoints}`, 430, 140);
    
    let y = 170;
    for (let [nome, skill] of Object.entries(skillTree)) {
        ctx.fillStyle = "#333";
        ctx.fillRect(360, y, 280, 30);
        ctx.fillStyle = "#4caf50";
        ctx.fillRect(360, y, 280 * (skill.nivel / skill.max), 30);
        ctx.fillStyle = "#ffffff";
        ctx.fillText(`${nome}: ${skill.nivel}/${skill.max}`, 370, y + 20);
        
        // Botão de comprar
        ctx.fillStyle = skillPoints > 0 && skill.nivel < skill.max ? "#ffaa00" : "#666";
        ctx.fillRect(610, y, 30, 30);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 16px Arial";
        ctx.fillText("+", 618, y + 22);
        
        if (mouse.clicado && mouse.x > 610 && mouse.x < 640 && mouse.y > y && mouse.y < y + 30) {
            comprarSkill(nome);
        }
        
        y += 40;
    }
    
    // Quests
    ctx.fillStyle = "#1a1f2a";
    ctx.fillRect(350, 390, 300, 150);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 18px Arial";
    ctx.fillText("QUESTS", 450, 420);
    
    quests.forEach((q, i) => {
        ctx.fillStyle = q.completa ? "#4caf50" : "#ffffff";
        ctx.font = "14px Arial";
        ctx.fillText(`${q.nome}: ${q.progresso}/${q.meta}`, 370, 460 + i * 30);
    });
    
    // Masmorras
    ctx.fillStyle = "#1a1f2a";
    ctx.fillRect(670, 80, 400, 460);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 18px Arial";
    ctx.fillText("MASMORRAS", 810, 110);
    
    masmorras.forEach((m, i) => {
        let y = 150 + i * 75;
        let sobre = mouse.x > 680 && mouse.x < 1060 && mouse.y > y && mouse.y < y + 60;
        
        ctx.fillStyle = sobre ? m.cor : "#333";
        ctx.fillRect(680, y, 380, 60);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 16px Arial";
        ctx.fillText(m.nome, 700, y + 25);
        ctx.font = "12px Arial";
        ctx.fillText(`Dificuldade: ${m.dificuldade}`, 700, y + 45);
        
        if (mouse.clicado && sobre) {
            iniciarMasmorra(m);
        }
    });
    
    // Inventário
    ctx.fillStyle = "#1a1f2a";
    ctx.fillRect(30, 430, 300, 200);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 16px Arial";
    ctx.fillText("INVENTÁRIO", 120, 460);
    
    jogador.inventario.slice(0, 8).forEach((item, i) => {
        let x = 40 + (i % 4) * 70;
        let y = 480 + Math.floor(i / 4) * 70;
        
        ctx.fillStyle = item.corEfeito || raridades[item.raridade].cor;
        ctx.fillRect(x, y, 60, 60);
        ctx.fillStyle = "#ffffff";
        ctx.font = "8px Arial";
        ctx.fillText(item.nome.substring(0, 8), x + 5, y + 70);
        ctx.fillText(`+${item.poder}`, x + 5, y + 80);
        
        if (mouse.clicado && mouse.x > x && mouse.x < x + 60 && mouse.y > y && mouse.y < y + 60) {
            equiparItem(jogador.inventario.indexOf(item));
        }
    });
    
    if (mouse.clicado) mouse.clicado = false;
}

function drawDungeon() {
    // Fundo da dungeon
    ctx.fillStyle = masmorraSelecionada ? masmorraSelecionada.corFundo || "#1a1f2a" : "#1a1f2a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grid
    ctx.strokeStyle = "#334455";
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.strokeStyle = "#223344";
        ctx.stroke();
    }
    for (let i = 0; i < canvas.height; i += 50) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
    }
    
    // Inimigos
    inimigos.forEach(i => {
        ctx.fillStyle = i.cor;
        ctx.shadowBlur = 20;
        ctx.shadowColor = i.cor;
        ctx.beginPath();
        ctx.arc(i.x, i.y, 20, 0, Math.PI * 2);
        ctx.fill();
        
        // Barra de vida
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#000";
        ctx.fillRect(i.x - 25, i.y - 35, 50, 5);
        ctx.fillStyle = "#f00";
        ctx.fillRect(i.x - 25, i.y - 35, 50 * (i.hp / i.maxHp), 5);
    });
    
    // Chefe
    if (chefe) {
        ctx.fillStyle = chefe.cor;
        ctx.shadowBlur = 30;
        ctx.shadowColor = chefe.cor;
        ctx.beginPath();
        ctx.arc(chefe.x, chefe.y, 40, 0, Math.PI * 2);
        ctx.fill();
        
        // Barra de vida do chefe
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#000";
        ctx.fillRect(chefe.x - 100, chefe.y - 60, 200, 15);
        ctx.fillStyle = "#f00";
        ctx.fillRect(chefe.x - 100, chefe.y - 60, 200 * (chefe.hp / chefe.maxHp), 15);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Arial";
        ctx.fillText(chefe.nome, chefe.x - 80, chefe.y - 70);
    }
    
    // Jogador
    ctx.shadowBlur = 30;
    ctx.shadowColor = jogador.iframe > 0 ? "#ff0000" : "#00ffff";
    ctx.fillStyle = jogador.iframe > 0 ? "#ff8888" : "#44aaff";
    ctx.beginPath();
    ctx.arc(jogador.x, jogador.y, 25 + Math.sin(jogador.animacao) * 2, 0, Math.PI * 2);
    ctx.fill();
    
    // Partículas
    particulas.forEach(p => {
        ctx.globalAlpha = p.vida / 20;
        ctx.fillStyle = p.cor;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.tamanho, 0, Math.PI * 2);
        ctx.fill();
    });
    
    // Números flutuantes
    numerosFlutuantes.forEach(n => {
        ctx.globalAlpha = n.vida / 40;
        ctx.font = "bold 20px Arial";
        ctx.fillStyle = n.cor;
        ctx.fillText(n.texto, n.x, n.y);
    });
    
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
}

function drawUI() {
    // Barra de vida
    ctx.fillStyle = "#333";
    ctx.fillRect(20, 20, 300, 30);
    ctx.fillStyle = "#f00";
    ctx.fillRect(20, 20, 300 * (jogador.hp / jogador.maxHp), 30);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Arial";
    ctx.fillText(`❤️ ${Math.floor(jogador.hp)}/${jogador.maxHp}`, 140, 45);
    
    // Poções
    ctx.fillStyle = "#333";
    ctx.fillRect(330, 20, 80, 30);
    ctx.fillStyle = "#0f0";
    ctx.fillRect(330, 20, 80 * (jogador.pocoes / 3), 30);
    ctx.fillStyle = "#fff";
    ctx.fillText(`🧪 ${jogador.pocoes}`, 350, 45);
    
    // XP
    ctx.fillStyle = "#333";
    ctx.fillRect(20, 60, 300, 15);
    ctx.fillStyle = "#ffd700";
    ctx.fillRect(20, 60, 300 * (jogador.xp / (jogador.nivel * 100)), 15);
    
    // Dash cooldown
    if (jogador.habilidades.dash) {
        ctx.fillStyle = "#333";
        ctx.fillRect(330, 60, 80, 20);
        ctx.fillStyle = "#00ffff";
        ctx.fillRect(330, 60, 80 * (1 - jogador.habilidades.dashCooldown / 120), 20);
        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        ctx.fillText("DASH", 350, 77);
    }
    
    // Mensagem
    if (tempoMensagem > 0) {
        ctx.globalAlpha = tempoMensagem / 120;
        ctx.font = "bold 30px Arial";
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#00ffff";
        ctx.fillText(mensagem, canvas.width / 2 - 150, canvas.height / 2);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }
    
    // Controles
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(canvas.width - 200, canvas.height - 100, 180, 80);
    ctx.fillStyle = "#fff";
    ctx.font = "12px Arial";
    ctx.fillText("ESPAÇO: Atacar", canvas.width - 190, canvas.height - 70);
    ctx.fillText("Q: Poção", canvas.width - 190, canvas.height - 55);
    ctx.fillText("SHIFT: Dash", canvas.width - 190, canvas.height - 40);
    ctx.fillText("WASD: Mover", canvas.width - 190, canvas.height - 25);
}

// ================= LOOP =================
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
