<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG Avançado - Slash Épico</title>
<style>
body { 
margin:0; 
overflow:hidden; 
background:#111; 
font-family:'Segoe UI', Arial, sans-serif; 
}
canvas { 
display:block; 
margin:auto; 
background: #0a0f1a;
box-shadow: 0 0 30px rgba(0,0,0,0.8);
cursor: crosshair;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 1100;
canvas.height = 650;

// ================= ESTADO DO JOGO =================
let estado = "lobby";
let teclas = {}, mouse = {x:0, y:0, clicado:false, direitoClicado:false};
let particulas = [];
let numerosFlutuantes = [];
let projetesis = [];
let slashes = []; // Efeitos de corte
let tempoJogo = 0;
let masmorraSelecionada = null;
let inimigos = [], chefe = null;
let masmorraLimpa = false;
let camera = {x:0, y:0};
let tremorTela = 0;
let mensagemTemporaria = {texto:"", tempo:0};
let conquistas = [];
let somEnabled = true;
let slotSelecionado = 0; // Para equipar itens

// Input
window.addEventListener("keydown",e=>teclas[e.key]=true);
window.addEventListener("keyup",e=>teclas[e.key]=false);
canvas.addEventListener("mousemove",e=>{
let r=canvas.getBoundingClientRect();
mouse.x=e.clientX-r.left;
mouse.y=e.clientY-r.top;
});
canvas.addEventListener("mousedown",(e)=>{
if(e.button===0) mouse.clicado=true;
if(e.button===2) mouse.direitoClicado=true;
});
canvas.addEventListener("mouseup",(e)=>{
if(e.button===0) mouse.clicado=false;
if(e.button===2) mouse.direitoClicado=false;
});
canvas.addEventListener("contextmenu",e=>e.preventDefault());

// ================= CORES E RARIDADES =================
const coresRaridade={
comum:"#a0a0a0",
raro:"#4a9eff",
epico:"#b87cff",
lendario:"#ffaa33",
mitico:"#ff5555"
};

const multiplicadorRaridade={
comum:1,
raro:1.5,
epico:2,
lendario:3,
mitico:5
};

// Tamanhos do slash por raridade (base 100%)
const tamanhoSlash = {
comum: 1.0,
raro: 1.2,
epico: 1.4,
lendario: 1.7,
mitico: 2.0
};

// ================= JOGADOR =================
const jogador={
x:0,y:0,
hp:100,
maxHp:100,
xp:0,
nivel:1,
ouro:0,
velocidade:5,
danoBase:15,
defesaBase:3,
iframe:0,
slashCooldown:0,
direcao:0,
animacao:0,
inventario:[],
// Slots de equipamento (0-arma, 1-armadura, 2-amuleto, 3-anel)
equipamento:[
null, // Arma
null, // Armadura
null, // Amuleto
null  // Anel
],
pocoes:5,
pocaoCooldown:0,
habilidades:{
dash:{desbloqueada:true,cooldown:0},
rajada:{desbloqueada:false,cooldown:0},
escudo:{desbloqueada:false,cooldown:0}
},
estatisticas:{
inimigosMortos:0,
chefesDerrotados:0,
danoCausado:0,
maiorDano:0,
masmorrasCompletadas:0
},
atributos:{
forca:5,
agilidade:5,
constituicao:5
},
efeitos:[]
};

// Centralizar jogador
jogador.x = canvas.width/2;
jogador.y = canvas.height/2;

// ================= MASMORRAS =================
const masmorras = [
{nome:"🌿 Caverna Verde",dificuldade:1,icon:"🌿",cor:"#4caf50",descricao:"Inimigos fracos, bom para começar"},
{nome:"🌑 Templo Sombrio",dificuldade:2,icon:"🌑",cor:"#9c27b0",descricao:"Armadilhas e esqueletos"},
{nome:"🔥 Abismo Infernal",dificuldade:3,icon:"🔥",cor:"#f44336",descricao:"Lava e demônios"},
{nome:"❄️ Pico Gelado",dificuldade:4,icon:"❄️",cor:"#00bcd4",descricao:"Gelo e ventos congelantes"},
{nome:"⚡ Torre da Tempestade",dificuldade:5,icon:"⚡",cor:"#ffc107",descricao:"Chefes poderosos e relâmpagos"}
];

// ================= HELPERS =================
function aleatorio(min,max){return Math.random()*(max-min)+min;}
function aleatorioInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function distancia(x1,y1,x2,y2){return Math.hypot(x1-x2,y1-y2);}

function getDefesa(){
let armaduraDef = jogador.equipamento[1] ? jogador.equipamento[1].poder : 0;
return jogador.defesaBase + armaduraDef + (jogador.atributos.constituicao * 0.5);
}

function getArmaEquipada(){
return jogador.equipamento[0];
}

function getCorArma(){
let arma = getArmaEquipada();
if(arma) return coresRaridade[arma.raridade];
return "#ffffff"; // Branco padrão
}

function getTamanhoSlash(){
let arma = getArmaEquipada();
if(arma) return tamanhoSlash[arma.raridade] || 1.0;
return 1.0; // Tamanho padrão
}

function calcularDanoRecebido(dano){
let reduzido = dano - (getDefesa() * 0.5);
let final = Math.max(1, Math.floor(reduzido * aleatorio(0.9,1.1)));
return final;
}

function getDanoJogador(){
let base = jogador.danoBase + (jogador.nivel * 3) + (jogador.atributos.forca * 2);
let arma = getArmaEquipada();
if(arma) base += arma.poder;

// Dano crítico (10% chance + bonus de agilidade)
let chanceCritico = 0.1 + (jogador.atributos.agilidade * 0.01);
if(Math.random() < chanceCritico){
criarMensagem("CRÍTICO!", "#ffaa00");
return Math.floor(base * 2);
}
return Math.floor(base * aleatorio(0.9,1.1));
}

// ================= SISTEMA DE PARTÍCULAS =================
function criarParticula(x,y,cor,tamanho=3,velocidade={x:0,y:0},vida=30){
for(let i=0;i<3;i++){
particulas.push({
x:x + (Math.random()-0.5)*10,
y:y + (Math.random()-0.5)*10,
cor,
tamanho:tamanho * aleatorio(0.5,1.5),
vx:velocidade.x + (Math.random()-0.5)*3,
vy:velocidade.y + (Math.random()-0.5)*3,
vida:vida + aleatorioInt(-5,5),
vidaMax:vida,
angulo:Math.random()*Math.PI*2
});
}
}

function criarSlash(x,y,direcao,cor,tamanho=1.0){
let comprimento = 60 * tamanho;
let largura = 25 * tamanho;
slashes.push({
x: x + Math.cos(direcao) * 30,
y: y + Math.sin(direcao) * 30,
direcao: direcao,
comprimento: comprimento,
largura: largura,
cor: cor,
vida: 10,
vidaMax: 10,
anguloAbertura: Math.PI/3 // 60 graus
});
}

function criarNumeroFlutuante(x,y,texto,cor="#fff",tamanho=20){
numerosFlutuantes.push({
x,y,texto,cor,
vida:60,
vx:(Math.random()-0.5)*0.8,
vy:-1.8,
tamanho
});
}

function criarMensagem(texto,cor="#fff"){
mensagemTemporaria = {texto, cor, tempo:120};
}

function atualizarParticulas(){
particulas = particulas.filter(p=>{
p.x += p.vx;
p.y += p.vy;
p.vida--;
p.vy += 0.1;
return p.vida>0;
});
}

function atualizarSlashes(){
slashes = slashes.filter(s=>{
s.vida--;
return s.vida>0;
});
}

function atualizarNumeros(){
numerosFlutuantes = numerosFlutuantes.filter(n=>{
n.x += n.vx;
n.y += n.vy;
n.vida--;
return n.vida>0;
});
}

// ================= INICIAR MASMORRA =================
function iniciarMasmorra(m){
masmorraSelecionada=m;
estado="dungeon";
inimigos=[];
chefe=null;
masmorraLimpa=false;
camera={x:0,y:0};
tremorTela=0;

jogador.x = canvas.width/2;
jogador.y = canvas.height/2;

let qtdInimigos = 3 + (m.dificuldade * 2);
for(let i=0;i<qtdInimigos;i++){
let tipo = Math.random()>0.7 ? "atirar" : "corpo";
let hpInimigo = 20 + (m.dificuldade * 15);
let danoInimigo = 5 + (m.dificuldade * 3);

inimigos.push({
x:aleatorio(200,900),
y:aleatorio(100,500),
hp:hpInimigo,
hpMax:hpInimigo,
dano:danoInimigo,
tipo:tipo,
velocidade: tipo==="corpo"?2:1.2,
cooldown:aleatorioInt(40,80),
cooldownAtual:0,
animacao:0,
cor: tipo==="corpo"?"#ff5555":"#ffaa44",
padrao:Math.random()>0.5?"agressivo":"cauteloso",
recompensaXp:10 * m.dificuldade
});
}

if(m.dificuldade >= 4){
inimigos.push({
x:550,y:250,
hp:200 * m.dificuldade,
hpMax:200 * m.dificuldade,
dano:15 * m.dificuldade,
tipo:"elite",
velocidade:1.5,
animacao:0,
cor:"#aa44ff",
recompensaXp:50 * m.dificuldade
});
}

criarMensagem(`Entrou em ${m.nome}`, "#4aff4a");
}

// ================= CRIAR CHEFE =================
function criarChefe(){
let nomes = ["Guardião", "Senhor das Trevas", "Dragão", "Demônio", "Lich", "Fênix"];
let titulos = ["da Perdição", "Eterno", "Sombrio", "Infernal", "Gélido", "Ancestral"];
chefe={
nome:`${nomes[Math.floor(Math.random()*nomes.length)]} ${titulos[Math.floor(Math.random()*titulos.length)]}`,
x:aleatorio(400,700),
y:aleatorio(100,300),
hp:500 * masmorraSelecionada.dificuldade,
hpMax:500 * masmorraSelecionada.dificuldade,
dano:20 * masmorraSelecionada.dificuldade,
cooldownDash:100,
dashAnim:0,
fase:1,
cooldownAtaque:0,
enfurecido:false,
padroes:["dash", "area", "projetil"],
ultimoPadrao:0,
cor:"#aa44ff"
};

for(let i=0;i<10;i++){
criarParticula(chefe.x,chefe.y,"#ff0",20,{x:aleatorio(-2,2),y:aleatorio(-2,2)},40);
}
criarMensagem("⚔️ CHEFE APARECEU! ⚔️", "#ff5500");
}

// ================= ATUALIZAR =================
function atualizar(){
tempoJogo++;

if(estado==="dungeon"){
camera.x = jogador.x - canvas.width/2;
camera.y = jogador.y - canvas.height/2;

atualizarJogador();
atualizarInimigos();
atualizarChefe();
atualizarProjeteis();
}

// Cooldowns
if(jogador.iframe>0) jogador.iframe--;
if(jogador.slashCooldown>0) jogador.slashCooldown--;
if(jogador.pocaoCooldown>0) jogador.pocaoCooldown--;
if(jogador.habilidades.dash.cooldown>0) jogador.habilidades.dash.cooldown--;
if(mensagemTemporaria.tempo>0) mensagemTemporaria.tempo--;

jogador.efeitos = jogador.efeitos.filter(e=>{
e.tempo--;
return e.tempo>0;
});

jogador.efeitos.forEach(e=>{
if(e.tipo === "veneno") jogador.hp -= 1;
if(e.tipo === "cura") jogador.hp = Math.min(jogador.maxHp, jogador.hp + 2);
});

atualizarParticulas();
atualizarSlashes();
atualizarNumeros();

if(tremorTela > 0) tremorTela--;

if(jogador.hp <= 0){
jogador.hp = jogador.maxHp;
estado = "lobby";
criarMensagem("Você morreu...", "#ff0000");
}
}

// ================= JOGADOR =================
function atualizarJogador(){
let dx=0,dy=0;
if(teclas["w"]||teclas["ArrowUp"])dy--;
if(teclas["s"]||teclas["ArrowDown"])dy++;
if(teclas["a"]||teclas["ArrowLeft"])dx--;
if(teclas["d"]||teclas["ArrowRight"])dx++;

if(dx||dy){
let len=Math.hypot(dx,dy);
dx/=len; dy/=len;
jogador.x+=dx*jogador.velocidade;
jogador.y+=dy*jogador.velocidade;
jogador.direcao=Math.atan2(dy,dx);
jogador.animacao+=0.2;

if(tempoJogo % 5 === 0){
criarParticula(jogador.x, jogador.y, "#aaa", 2, 
{x:-dx*1, y:-dy*1}, 8);
}
}

if(teclas[" "]) atacar();

if(teclas["q"] && jogador.pocoes>0 && jogador.pocaoCooldown===0){
usarPocao();
}

if(teclas["Shift"] && jogador.habilidades.dash.desbloqueada && jogador.habilidades.dash.cooldown===0){
usarDash(dx,dy);
}

// Teclas numéricas para equipar (1-4)
if(teclas["1"]) slotSelecionado = 0;
if(teclas["2"]) slotSelecionado = 1;
if(teclas["3"]) slotSelecionado = 2;
if(teclas["4"]) slotSelecionado = 3;

jogador.x = Math.max(50, Math.min(1050, jogador.x));
jogador.y = Math.max(50, Math.min(600, jogador.y));
}

function atacar(){
if(jogador.slashCooldown>0) return;
jogador.slashCooldown = 15;

let dano = getDanoJogador();
let corArma = getCorArma();
let tamanho = getTamanhoSlash();
let acertou = false;

// Cria o efeito de slash
criarSlash(jogador.x, jogador.y, jogador.direcao, corArma, tamanho);

// Partículas extras baseadas na raridade
let qtdParticulas = Math.floor(5 * tamanho);
for(let i=0;i<qtdParticulas;i++){
let ang = jogador.direcao + (Math.random()-0.5)*0.8;
criarParticula(
jogador.x + Math.cos(ang)*50,
jogador.y + Math.sin(ang)*50,
corArma,
5 * tamanho,
{x:Math.cos(ang)*8, y:Math.sin(ang)*8},
12
);
}

// Atacar inimigos
inimigos.forEach(i=>{
if(distancia(jogador.x,jogador.y,i.x,i.y) < 90 + (20*tamanho)){
i.hp -= dano;
jogador.estatisticas.danoCausado += dano;
jogador.estatisticas.maiorDano = Math.max(jogador.estatisticas.maiorDano, dano);
criarNumeroFlutuante(i.x,i.y-20,`-${dano}`, corArma, 24);
criarParticula(i.x,i.y, corArma, 10 * tamanho, {}, 15);
acertou = true;

let ang = Math.atan2(i.y - jogador.y, i.x - jogador.x);
i.x += Math.cos(ang) * 25 * tamanho;
i.y += Math.sin(ang) * 25 * tamanho;
}
});

// Atacar chefe
if(chefe && distancia(jogador.x,jogador.y,chefe.x,chefe.y) < 130 + (30*tamanho)){
chefe.hp -= dano;
jogador.estatisticas.danoCausado += dano;
criarNumeroFlutuante(chefe.x,chefe.y-30,`-${dano}`, corArma, 28);
criarParticula(chefe.x,chefe.y, corArma, 15 * tamanho, {}, 20);
acertou = true;
}

if(acertou) tremorTela = 8;
}

function usarPocao(){
jogador.pocoes--;
jogador.hp = Math.min(jogador.maxHp, jogador.hp + 50);
jogador.pocaoCooldown = 120;
criarParticula(jogador.x,jogador.y,"#4aff4a",30,{x:0,y:-2},40);
criarNumeroFlutuante(jogador.x,jogador.y-30,"+50 HP","#4caf50");
}

function usarDash(dx,dy){
if(dx===0 && dy===0){
dx = Math.cos(jogador.direcao);
dy = Math.sin(jogador.direcao);
}

jogador.x += dx * 200;
jogador.y += dy * 200;
jogador.habilidades.dash.cooldown = 150;

for(let i=0;i<20;i++){
criarParticula(jogador.x, jogador.y, "#00ffff", 5, 
{x:dx*2 + (Math.random()-0.5)*2, y:dy*2 + (Math.random()-0.5)*2}, 20);
}
tremorTela = 8;
criarMensagem("Dash!", "#00ffff");
}

// ================= INIMIGOS =================
function atualizarInimigos(){
inimigos = inimigos.filter(i=>{
if(i.hp<=0){
jogador.estatisticas.inimigosMortos++;
jogador.xp += i.recompensaXp || 15;
jogador.ouro += aleatorioInt(5,15);

if(Math.random() < 0.1){
darLoot(1, i.x, i.y);
}

for(let p=0;p<15;p++){
criarParticula(i.x,i.y,i.cor,8,{x:aleatorio(-3,3),y:aleatorio(-3,3)},25);
}
return false;
}

let d = distancia(jogador.x, jogador.y, i.x, i.y);
i.animacao += 0.05;

if(i.tipo === "corpo"){
let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
i.x += Math.cos(ang) * i.velocidade;
i.y += Math.sin(ang) * i.velocidade;

if(d < 35 && i.cooldownAtual === 0){
danoJogador(i.dano);
i.cooldownAtual = 40;
criarParticula(jogador.x,jogador.y,"#f00",12,{},15);
}
}

if(i.tipo === "atirar"){
let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
if(d < 150){
i.x -= Math.cos(ang) * 1.5;
i.y -= Math.sin(ang) * 1.5;
}

i.cooldownAtual--;
if(i.cooldownAtual <= 0 && d < 400){
criarProjetil(i.x, i.y, ang, i.dano, "inimigo");
i.cooldownAtual = i.cooldown;
}
}

if(i.tipo === "elite"){
let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
i.x += Math.cos(ang) * 1.2;
i.y += Math.sin(ang) * 1.2;

if(i.cooldownAtual === 0){
if(d < 80){
danoJogador(i.dano * 1.5);
i.cooldownAtual = 60;
}else if(Math.random()<0.02){
criarProjetil(i.x, i.y, ang + 0.5, i.dano, "inimigo");
criarProjetil(i.x, i.y, ang - 0.5, i.dano, "inimigo");
}
}
}

if(i.cooldownAtual > 0) i.cooldownAtual--;

return true;
});

if(inimigos.length === 0 && !chefe && !masmorraLimpa){
masmorraLimpa = true;
criarChefe();
}
}

// ================= PROJÉTEIS =================
function criarProjetil(x,y,ang,dano,origem){
projetesis.push({
x,y,
vx:Math.cos(ang)*5,
vy:Math.sin(ang)*5,
dano,
origem,
vida:120,
tamanho:5,
cor: origem==="jogador"?"#4aff4a":"#ff5555"
});
}

function atualizarProjeteis(){
projetesis = projetesis.filter(p=>{
p.x += p.vx;
p.y += p.vy;
p.vida--;

if(p.origem === "inimigo" && distancia(p.x,p.y,jogador.x,jogador.y) < 25){
danoJogador(p.dano);
return false;
}

if(p.origem === "jogador"){
for(let i of inimigos){
if(distancia(p.x,p.y,i.x,i.y) < 30){
i.hp -= p.dano;
criarNumeroFlutuante(i.x,i.y-20,`-${p.dano}`,"#ff5555");
return false;
}
}
if(chefe && distancia(p.x,p.y,chefe.x,chefe.y) < 50){
chefe.hp -= p.dano;
criarNumeroFlutuante(chefe.x,chefe.y-30,`-${p.dano}`,"#ffaa00");
return false;
}
}

return p.vida > 0 && p.x > 0 && p.x < 1100 && p.y > 0 && p.y < 650;
});
}

// ================= CHEFE =================
function atualizarChefe(){
if(!chefe) return;

let d = distancia(jogador.x, jogador.y, chefe.x, chefe.y);
let ang = Math.atan2(jogador.y - chefe.y, jogador.x - chefe.x);

chefe.x += Math.cos(ang) * (chefe.enfurecido ? 2 : 1.2);
chefe.y += Math.sin(ang) * (chefe.enfurecido ? 2 : 1.2);

if(chefe.hp < chefe.hpMax/2 && !chefe.enfurecido){
chefe.enfurecido = true;
chefe.cor = "#ff4444";
chefe.dano *= 1.8;
criarMensagem("CHEFE ENFURECEU!", "#ff0000");
for(let i=0;i<30;i++){
criarParticula(chefe.x,chefe.y,"#ff0000",15,{x:aleatorio(-4,4),y:aleatorio(-4,4)},40);
}
}

chefe.cooldownAtaque--;
if(chefe.cooldownAtaque <= 0){
let padrao = chefe.padroes[Math.floor(Math.random()*chefe.padroes.length)];

if(padrao === "dash"){
chefe.dashAnim = 15;
chefe.x += Math.cos(ang) * 150;
chefe.y += Math.sin(ang) * 150;
tremorTela = 12;
if(d < 100) danoJogador(chefe.dano * 1.5);
}
if(padrao === "area"){
for(let i=0;i<8;i++){
let a = (i/8)*Math.PI*2;
criarProjetil(chefe.x, chefe.y, a, chefe.dano/2, "inimigo");
}
}
if(padrao === "projetil"){
for(let i=-1;i<=1;i++){
criarProjetil(chefe.x, chefe.y, ang + i*0.3, chefe.dano, "inimigo");
}
}

chefe.cooldownAtaque = chefe.enfurecido ? 45 : 60;
}

if(d < 50 && chefe.cooldownAtaque%20 === 0){
danoJogador(chefe.dano);
}

if(chefe.hp <= 0){
jogador.estatisticas.chefesDerrotados++;
jogador.estatisticas.masmorrasCompletadas++;
jogador.xp += 200 * masmorraSelecionada.dificuldade;
jogador.ouro += 150 * masmorraSelecionada.dificuldade;
criarMensagem("CHEFE DERROTADO! 🏆", "#ffd700");

for(let i=0;i<50;i++){
criarParticula(chefe.x,chefe.y,"#ffd700",15,{x:aleatorio(-5,5),y:aleatorio(-5,5)},40);
}

darLoot(3, chefe.x, chefe.y);
estado = "lobby";
chefe = null;
}
}

// ================= DANO =================
function danoJogador(quantidade){
if(jogador.iframe>0) return;
let danoFinal = calcularDanoRecebido(quantidade);
jogador.hp -= danoFinal;
jogador.iframe = 25;
tremorTela = 10;
criarNumeroFlutuante(jogador.x,jogador.y-30,`-${danoFinal}`,"#ff0000",28);

for(let i=0;i<12;i++){
criarParticula(jogador.x,jogador.y,"#f00",8,{x:aleatorio(-4,4),y:aleatorio(-4,4)},15);
}
}

// ================= ITENS E LOOT =================
function darLoot(quantidade, x, y){
for(let l=0;l<quantidade;l++){
let raridades = ["comum","raro","epico","lendario","mitico"];
let chances = [0.5,0.3,0.15,0.04,0.01];
let rand = Math.random();
let raridade = "comum";
let acum = 0;
for(let i=0;i<chances.length;i++){
acum += chances[i];
if(rand < acum){
raridade = raridades[i];
break;}
}

let tipo = Math.random()>0.5 ? "arma" : "armadura";
let poder = tipo === "arma" ? 
aleatorioInt(8,20)*multiplicadorRaridade[raridade] :
aleatorioInt(5,15)*multiplicadorRaridade[raridade];

let item = {
tipo,
poder: Math.floor(poder),
raridade,
nome: gerarNomeItem(tipo, raridade)
};

jogador.inventario.push(item);
criarMensagem(`${item.nome} obtido!`, coresRaridade[raridade]);
criarParticula(x || jogador.x, y || jogador.y, coresRaridade[raridade], 15, {}, 30);
}
}

function gerarNomeItem(tipo, raridade){
let prefixos = {comum:"Simples",raro:"Refinado",epico:"Épico",lendario:"Lendário",mitico:"Mítico"};
let armas = ["Espada","Machado","Adaga","Arco","Cajado","Martelo","Lança"];
let armaduras = ["Escudo","Elmo","Peitoral","Botas","Luvas","Colar","Cinto"];
let lista = tipo==="arma"?armas:armaduras;
return `${prefixos[raridade]} ${lista[Math.floor(Math.random()*lista.length)]}`;
}

// Função para equipar item
function equiparItem(indexInventario){
let item = jogador.inventario[indexInventario];
if(!item) return;

let slot = item.tipo === "arma" ? 0 : 1; // Arma slot 0, Armadura slot 1
// Devolver item atual ao inventário
if(jogador.equipamento[slot]){
jogador.inventario.push(jogador.equipamento[slot]);
}
jogador.equipamento[slot] = item;
jogador.inventario.splice(indexInventario, 1);
criarMensagem(`${item.nome} equipado!`, coresRaridade[item.raridade]);
}

// ================= DESENHAR =================
function desenhar(){
ctx.save();
ctx.clearRect(0,0,canvas.width,canvas.height);

let tremerX = (Math.random()-0.5)*tremorTela;
let tremerY = (Math.random()-0.5)*tremorTela;
ctx.translate(-camera.x + tremerX, -camera.y + tremerY);

if(estado==="lobby"){
desenharLobby();
}
if(estado==="dungeon"){
desenharMasmorra();
}

ctx.restore();
desenharUI();
}

function desenharLobby(){
ctx.fillStyle = "#0f1222";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.font = "bold 48px 'Segoe UI'";
ctx.fillStyle = "#fff";
ctx.shadowColor = "#4a9eff";
ctx.shadowBlur = 20;
ctx.fillText("⚔️ RPG DAS MASMORRAS ⚔️", 220, 100);
ctx.shadowBlur = 0;

// Card do jogador
ctx.fillStyle = "#2a2f3f";
ctx.shadowBlur = 15;
ctx.shadowColor = "#000";
ctx.fillRect(40,140,320,300);
ctx.fillStyle = "#fff";
ctx.font = "bold 22px Arial";
ctx.fillText(`Nível ${jogador.nivel} Guerreiro`,60,180);
ctx.font = "18px Arial";
ctx.fillText(`❤️ ${jogador.hp}/${jogador.maxHp}`,60,220);
ctx.fillText(`✨ XP: ${jogador.xp}/${jogador.nivel*100}`,60,255);
ctx.fillText(`🪙 Ouro: ${jogador.ouro}`,60,290);
ctx.fillText(`⚔️ Dano: ${getDanoJogador()}`,60,325);
ctx.fillText(`🛡️ Defesa: ${Math.floor(getDefesa())}`,60,360);
ctx.fillText(`💪 Força: ${jogador.atributos.forca}`,60,395);

// Slots de equipamento
ctx.fillStyle = "#1a1f2a";
ctx.fillRect(40,450,320,80);
ctx.fillStyle = "#fff";
ctx.font = "bold 16px Arial";
ctx.fillText("EQUIPAMENTOS", 150, 440);

for(let s=0;s<4;s++){
let x = 50 + s*80;
ctx.fillStyle = s === slotSelecionado ? "#4a9eff" : "#333";
ctx.fillRect(x,460,60,60);
if(jogador.equipamento[s]){
ctx.fillStyle = coresRaridade[jogador.equipamento[s].raridade];
ctx.font = "12px Arial";
ctx.fillText(jogador.equipamento[s].nome.substring(0,6), x+5, 530);
ctx.fillText(`+${jogador.equipamento[s].poder}`, x+5, 545);
}
}

// Masmorras
masmorras.forEach((m,i)=>{
let x = 380 + (i%2)*320;
let y = 150 + Math.floor(i/2)*120;
let sobre = mouse.x>x && mouse.x<x+300 && mouse.y>y && mouse.y<y+100;

ctx.fillStyle = sobre ? m.cor : "#2a2f3f";
ctx.shadowBlur = sobre ? 25 : 10;
ctx.fillRect(x,y,300,100);

ctx.fillStyle = "#fff";
ctx.font = "bold 24px Arial";
ctx.fillText(`${m.icon} ${m.nome}`, x+20, y+40);
ctx.font = "14px Arial";
ctx.fillText(`Dificuldade: ${m.dificuldade}`, x+20, y+70);
ctx.fillText(m.descricao, x+20, y+90);

if(mouse.clicado && sobre){
iniciarMasmorra(m);
}
});

// Inventário
ctx.shadowBlur = 10;
ctx.fillStyle = "#2a2f3f";
ctx.fillRect(40,550,1000,70);
ctx.fillStyle = "#fff";
ctx.font = "bold 16px Arial";
ctx.fillText("Inventário (clique para equipar)",60,580);

jogador.inventario.slice(0,12).forEach((item,i)=>{
let x = 70 + i*80;
ctx.fillStyle = coresRaridade[item.raridade];
ctx.fillRect(x,590,60,60);
ctx.fillStyle = "#fff";
ctx.font = "10px Arial";
ctx.fillText(item.nome.substring(0,5), x+5, 660);
ctx.fillText(`+${item.poder}`, x+5, 675);

// Equipar ao clicar
if(mouse.clicado && mouse.x > x && mouse.x < x+60 && mouse.y > 590 && mouse.y < 650){
equiparItem(i);
}
});

if(mouse.clicado) mouse.clicado=false;
}

function desenharMasmorra(){
ctx.fillStyle = "#1a1f2a";
ctx.fillRect(0,0,canvas.width*2,canvas.height*2);

// Grid
ctx.strokeStyle = "#334455";
ctx.lineWidth = 1;
for(let i=-100;i<canvas.width*2;i+=60){
ctx.beginPath();
ctx.moveTo(i,0);
ctx.lineTo(i,canvas.height*2);
ctx.strokeStyle = "#223344";
ctx.stroke();
}
for(let i=-100;i<canvas.height*2;i+=60){
ctx.beginPath();
ctx.moveTo(0,i);
ctx.lineTo(canvas.width*2,i);
ctx.stroke();
}

// Slashes (efeitos de corte)
slashes.forEach(s=>{
let alpha = s.vida/s.vidaMax;
ctx.save();
ctx.translate(s.x, s.y);
ctx.rotate(s.direcao);
ctx.globalAlpha = alpha;
ctx.fillStyle = s.cor;
ctx.shadowBlur = 20;
ctx.shadowColor = s.cor;

// Desenha um arco/cone para o slash
ctx.beginPath();
ctx.moveTo(0, 0);
ctx.lineTo(s.comprimento, -s.largura/2);
ctx.lineTo(s.comprimento, s.largura/2);
ctx.closePath();
ctx.fill();
ctx.restore();
});

// Projéteis
projetesis.forEach(p=>{
ctx.fillStyle = p.cor;
ctx.shadowBlur = 15;
ctx.shadowColor = p.cor;
ctx.beginPath();
ctx.arc(p.x, p.y, p.tamanho, 0, Math.PI*2);
ctx.fill();
});

// Inimigos
inimigos.forEach(i=>{
ctx.fillStyle = i.cor;
ctx.shadowBlur = 25;
ctx.shadowColor = i.cor;
ctx.beginPath();
ctx.arc(i.x, i.y, 18 + Math.sin(i.animacao)*2, 0, Math.PI*2);
ctx.fill();

ctx.shadowBlur = 0;
ctx.fillStyle = "#000";
ctx.fillRect(i.x-25, i.y-35, 50, 5);
ctx.fillStyle = "#f00";
ctx.fillRect(i.x-25, i.y-35, 50 * (i.hp/i.hpMax), 5);
});

// Chefe
if(chefe){
ctx.fillStyle = chefe.cor;
ctx.shadowBlur = 50;
ctx.shadowColor = chefe.enfurecido?"#f00":"#a0f";
ctx.beginPath();
ctx.arc(chefe.x, chefe.y, 45 + Math.sin(tempoJogo*0.1)*5, 0, Math.PI*2);
ctx.fill();

ctx.shadowBlur = 0;
ctx.font = "bold 24px Arial";
ctx.fillStyle = "#fff";
ctx.fillText(chefe.nome, chefe.x-100, chefe.y-80);
ctx.fillStyle = "#000";
ctx.fillRect(chefe.x-120, chefe.y-60, 240, 20);
ctx.fillStyle = "#f00";
ctx.fillRect(chefe.x-120, chefe.y-60, 240 * (chefe.hp/chefe.hpMax), 20);
}

// Jogador
ctx.shadowBlur = 40;
ctx.shadowColor = jogador.iframe>0 ? "#f00" : getCorArma();
ctx.fillStyle = jogador.iframe>0 ? "#ff8888" : "#44aaff";

ctx.beginPath();
ctx.arc(jogador.x, jogador.y, 22 + Math.sin(jogador.animacao)*2, 0, Math.PI*2);
ctx.fill();

// Arma equipada (visual)
let arma = getArmaEquipada();
if(arma){
ctx.beginPath();
ctx.moveTo(jogador.x, jogador.y);
ctx.lineTo(jogador.x + Math.cos(jogador.direcao)*45, jogador.y + Math.sin(jogador.direcao)*45);
ctx.strokeStyle = coresRaridade[arma.raridade];
ctx.lineWidth = 6;
ctx.shadowBlur = 20;
ctx.stroke();
}

// Partículas
particulas.forEach(p=>{
ctx.globalAlpha = p.vida/p.vidaMax;
ctx.fillStyle = p.cor;
ctx.beginPath();
ctx.arc(p.x, p.y, p.tamanho * (p.vida/p.vidaMax), 0, Math.PI*2);
ctx.fill();
});

// Números flutuantes
numerosFlutuantes.forEach(n=>{
ctx.globalAlpha = n.vida/60;
ctx.font = `bold ${n.tamanho}px Arial`;
ctx.fillStyle = n.cor;
ctx.fillText(n.texto, n.x, n.y);
});
ctx.globalAlpha = 1;
ctx.shadowBlur = 0;
}

function desenharUI(){
ctx.save();
ctx.setTransform(1,0,0,1,0,0);

// Barra de vida
ctx.fillStyle = "#333";
ctx.fillRect(20,20,300,30);
ctx.fillStyle = "#f00";
ctx.fillRect(20,20,300 * (jogador.hp/jogador.maxHp),30);
ctx.fillStyle = "#fff";
ctx.font = "bold 18px Arial";
ctx.fillText(`❤️ ${Math.floor(jogador.hp)}/${jogador.maxHp}`, 140, 45);

// Poções
ctx.fillStyle = "#333";
ctx.fillRect(330,20,120,30);
ctx.fillStyle = "#0f0";
ctx.fillRect(330,20,120 * (jogador.pocaoCooldown?0:jogador.pocoes/5),30);
ctx.fillStyle = "#fff";
ctx.fillText(`🧪 x${jogador.pocoes}`, 360, 45);

// XP
ctx.fillStyle = "#333";
ctx.fillRect(20,60,300,15);
ctx.fillStyle = "#ffd700";
ctx.fillRect(20,60,300 * (jogador.xp/(jogador.nivel*100)),15);

// Status
ctx.fillStyle = "#fff";
ctx.font = "16px Arial";
ctx.fillText(`Nível ${jogador.nivel}`, 330, 75);
ctx.fillText(`🪙 ${jogador.ouro}`, 440, 75);

// Arma equipada (informação)
let arma = getArmaEquipada();
if(arma){
ctx.fillStyle = coresRaridade[arma.raridade];
ctx.fillRect(470,20,200,40);
ctx.fillStyle = "#fff";
ctx.font = "bold 14px Arial";
ctx.fillText(`${arma.nome} +${arma.poder}`, 480, 45);
}

// Mensagem temporária
if(mensagemTemporaria.tempo > 0){
ctx.globalAlpha = mensagemTemporaria.tempo/120;
ctx.font = "bold 36px Arial";
ctx.fillStyle = mensagemTemporaria.cor;
ctx.shadowBlur = 20;
ctx.shadowColor = mensagemTemporaria.cor;
ctx.fillText(mensagemTemporaria.texto, canvas.width/2-150, canvas.height/2);
ctx.shadowBlur = 0;
ctx.globalAlpha = 1;
}

// HUD da masmorra
if(estado==="dungeon"){
ctx.fillStyle = "#333";
ctx.fillRect(20,100,180,40);
ctx.fillStyle = "#fff";
ctx.fillText(`👥 Inimigos: ${inimigos.length}`, 40, 130);
if(chefe) ctx.fillText("BOSS ATIVO!", 40, 170);
}

// Instruções
ctx.fillStyle = "rgba(0,0,0,0.5)";
ctx.fillRect(canvas.width-220, canvas.height-100, 200, 80);
ctx.fillStyle = "#fff";
ctx.font = "12px Arial";
ctx.fillText("ESPAÇO: Atacar", canvas.width-210, canvas.height-70);
ctx.fillText("Q: Poção", canvas.width-210, canvas.height-55);
ctx.fillText("SHIFT: Dash", canvas.width-210, canvas.height-40);
ctx.fillText("1-4: Selecionar slot", canvas.width-210, canvas.height-25);

ctx.restore();
}

// ================= LOOP =================
function loop(){
atualizar();
desenhar();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
