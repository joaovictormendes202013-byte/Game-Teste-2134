// ================= HELPERS =================
function aleatorio(min,max){return Math.random()*(max-min)+min;}
function aleatorioInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function distancia(x1,y1,x2,y2){return Math.hypot(x1-x2,y1-y2);}

function getDefesa(){
let armaduraDef = jogador.equipamento[1] ? jogador.equipamento[1].poder : 0;
let amuletoDef = jogador.equipamento[2] && jogador.equipamento[2].defBonus ? jogador.equipamento[2].defBonus : 0;
return jogador.defesaBase + armaduraDef + amuletoDef + (jogador.atributos.constituicao * 0.5) + (skillTree.constituicao.nivel * 5);
}

function getArmaEquipada(){
return jogador.equipamento[0];
}

function getCorArma(){
let arma = getArmaEquipada();
if(arma) return arma.corEfeito || coresRaridade[arma.raridade];
return "#ffffff";
}

function getTamanhoSlash(){
let arma = getArmaEquipada();
if(arma) return tamanhoSlash[arma.raridade] || 1.0;
return 1.0;
}

function calcularDanoRecebido(dano){
let reduzido = dano - (getDefesa() * 0.5);
let final = Math.max(1, Math.floor(reduzido * aleatorio(0.9,1.1)));
return final;
}

function getDanoJogador(){
let base = jogador.danoBase + (jogador.nivel * 3) + (jogador.atributos.forca * 2) + (skillTree.forca.nivel * 2);
let arma = getArmaEquipada();
if(arma) base += arma.poder;
if(arma && arma.danoBonus) base += arma.danoBonus;

let chanceCritico = 0.1 + (jogador.atributos.agilidade * 0.01) + (skillTree.agilidade.nivel * 0.02);
let multiplicadorCritico = 2 + (skillTree.danoCritico.nivel * 0.5);

if(Math.random() < chanceCritico){
criarMensagem("CRÍTICO!", "#ffaa00");
return Math.floor(base * multiplicadorCritico);
}
return Math.floor(base * aleatorio(0.9,1.1));
}

function getVelocidade(){
return jogador.velocidade + (skillTree.velocidade.nivel * 0.5);
}

// ================= GERAR ITEM COM EFEITO =================
function gerarItemComEfeito(tipo, raridade, nivelDungeon){
let poderBase = tipo === "arma" ? aleatorioInt(8,20) : aleatorioInt(5,15);
let poder = Math.floor(poderBase * multiplicadorRaridade[raridade] * (1 + nivelDungeon*0.1));

let item = {
tipo,
poder,
raridade,
nome: gerarNomeItem(tipo, raridade),
efeito: null
};

// 30% de chance de ter efeito especial
if(Math.random() < 0.3){
let efeito = efeitosEspeciais[Math.floor(Math.random() * efeitosEspeciais.length)];
item.efeito = efeito.nome;
item.corEfeito = efeito.cor;
item.descEfeito = efeito.desc;
item.danoBonus = efeito.danoBonus || 0;
item.defBonus = efeito.defBonus || 0;
item.vidaBonus = efeito.vidaBonus || 0;
item.xpBonus = efeito.xpBonus || 0;
item.velocidadeBonus = efeito.velocidadeBonus || 0;
item.forcaBonus = efeito.forcaBonus || 0;
item.agilidadeBonus = efeito.agilidadeBonus || 0;
item.constituicaoBonus = efeito.constituicaoBonus || 0;

item.nome = `${efeito.nome} ${item.nome}`;
}

return item;
}

function gerarNomeItem(tipo, raridade){
let prefixos = {comum:"",raro:"Refinado",epico:"Épica",lendario:"Lendária",mitico:"Mítica"};
let armas = ["Espada","Machado","Adaga","Arco","Cajado","Martelo","Lança","Foice","Katana"];
let armaduras = ["Escudo","Elmo","Peitoral","Botas","Luvas","Colar","Cinto","Manto","Armadura"];
let amuletos = ["Amuleto","Pingente","Talismã","Cristal","Runas","Ídolo"];
let aneis = ["Anel","Anel de Ouro","Anel de Prata","Anel de Rubi","Anel de Safira"];

let lista;
if(tipo === "arma") lista = armas;
else if(tipo === "armadura") lista = armaduras;
else if(tipo === "amuleto") lista = amuletos;
else lista = aneis;

return `${prefixos[raridade]} ${lista[Math.floor(Math.random()*lista.length)]}`;
}

function criarParticula(x,y,cor,tamanho=3,velocidade={x:0,y:0},vida=30){

particulas.push({
x:x + (Math.random()-0.5)*10,
y:y + (Math.random()-0.5)*10,
cor,
tamanho:tamanho * aleatorio(0.5,1.5),
vx:velocidade.x + (Math.random()-0.5)*3,
vy:velocidade.y + (Math.random()-0.5)*3,
vida:vida + aleatorioInt(-5,5),
vidaMax:vida,
});
}
}

function criarSlash(x,y,direcao,cor,tamanho=1.0){
let comprimento = 70 * tamanho;
let largura = 40 * tamanho;
slashes.push({
x: x + Math.cos(direcao) * 35,
y: y + Math.sin(direcao) * 35,
direcao: direcao,
comprimento: comprimento,
largura: largura,
cor: cor,
vida: 8,
vidaMax: 8
});
}

// ================= SKILL TREE =================
function comprarSkill(skill){
if(skill === "dash"){
if(jogador.ouro >= 500 && !jogador.habilidades.dash.desbloqueada){
jogador.ouro -= 500;
jogador.habilidades.dash.desbloqueada = true;
skillTree.dash.desbloqueado = true;
criarMensagem("DASH DESBLOQUEADO!", "#00ffff");
}
return;
}

if(skill === "duploSlash"){
if(jogador.ouro >= 1000 && !jogador.habilidades.duploSlash.desbloqueada){
jogador.ouro -= 1000;
jogador.habilidades.duploSlash.desbloqueada = true;
skillTree.duploSlash.desbloqueado = true;
criarMensagem("DUPLO ATAQUE!", "#ffaa00");
}
return;
}

if(skillPoints <= 0) return;
let s = skillTree[skill];
if(s.nivel < s.max){
s.nivel++;
skillPoints--;
jogador.atributos[skill] = (jogador.atributos[skill] || 0) + s.bonus;
criarMensagem(`${skill} aumentado!`, "#4aff4a");
}
}

// ================= QUESTS =================
function atualizarQuests(tipo, quantidade=1){
questsDisponiveis.forEach(q => {
if(!q.completa && q.tipo === tipo){
q.progresso += quantidade;
if(q.progresso >= q.meta){
q.completa = true;
jogador.xp += q.recompensaXP;
if(q.recompensaOuro) jogador.ouro += q.recompensaOuro;
criarMensagemQuest(`QUEST COMPLETA: ${q.nome}!`, "#ffd700");

if(q.recompensaSkill === "dash"){
jogador.habilidades.dash.desbloqueada = true;
skillTree.dash.desbloqueado = true;
criarMensagem("HABILIDADE DASH DESBLOQUEADA!", "#00ffff");
}
if(q.recompensaSkill === "duploSlash"){
jogador.habilidades.duploSlash.desbloqueada = true;
skillTree.duploSlash.desbloqueado = true;
criarMensagem("HABILIDADE DUPLO ATAQUE!", "#ffaa00");
}
}
}
});
}

// ================= INICIAR MASMORRA =================
function iniciarMasmorra(m){
masmorraSelecionada=m;

inimigos=[];

jogador.y = canvas.height/2;

camera.y = 0;

inimigos.push({

hp:120 * m.dificuldade,

criarMensagem(`Entrou em ${m.nome}`, m.cor);
}

// ================= ATUALIZAR =================
function atualizar(){
tempoJogo++;

if(estado==="dungeon"){
camera.x += (jogador.x - canvas.width/2 - camera.x) * 0.1;
camera.y += (jogador.y - canvas.height/2 - camera.y) * 0.1;

atualizarJogador();
atualizarInimigos();
atualizarChefe();
atualizarProjeteis();
}

// Cooldowns
if(jogador.iframe>0) jogador.iframe--;
if(jogador.slashCooldown>0) jogador.slashCooldown--;
if(jogador.pocaoCooldown>0) jogador.pocaoCooldown--;
if(jogador.habilidades.dash.cooldown>0) jogador.habilidades.dash.cooldown--;
if(jogador.habilidades.duploSlash.cooldown>0) jogador.habilidades.duploSlash.cooldown--;
if(mensagemTemporaria.tempo>0) mensagemTemporaria.tempo--;
if(mensagemQuest.tempo>0) mensagemQuest.tempo--;

// Regen de vida
jogador.regenTimer++;
if(jogador.regenTimer >= 60 && skillTree.vidaRegen.nivel > 0){
jogador.hp = Math.min(jogador.maxHp, jogador.hp + skillTree.vidaRegen.nivel);
jogador.regenTimer = 0;
}

atualizarParticulas();
atualizarSlashes();
atualizarNumeros();

if(tremorTela > 0) tremorTela--;

if(jogador.hp <= 0){
jogador.hp = jogador.maxHp;
jogador.x = 550;
jogador.y = 500;
estado = "lobby";
tremorTela = 0;
canvas.style.background = "#0a0f1a";
criarMensagem("Você morreu...", "#ff0000");
}
}

// ================= JOGADOR =================
function atualizarJogador(){
let dx=0,dy=0;
let velocidadeAtual = getVelocidade();

if(teclas["w"]||teclas["ArrowUp"])dy--;
if(teclas["s"]||teclas["ArrowDown"])dy++;
if(teclas["a"]||teclas["ArrowLeft"])dx--;
if(teclas["d"]||teclas["ArrowRight"])dx++;

if(dx||dy){
let len=Math.hypot(dx,dy);
dx/=len; dy/=len;
jogador.x+=dx*velocidadeAtual;
jogador.y+=dy*velocidadeAtual;
jogador.direcao=Math.atan2(dy,dx);
jogador.animacao+=0.2;

if(tempoJogo % 5 === 0){
criarParticula(jogador.x, jogador.y, "#aaa", 2, 
{x:-dx*1, y:-dy*1}, 8);
}
}

jogador.x = Math.max(50, Math.min(1050, jogador.x));
jogador.y = Math.max(50, Math.min(600, jogador.y));

if(teclas[" "]) atacar();
if(teclas["q"] && jogador.pocoes>0 && jogador.pocaoCooldown===0) usarPocao();
if(teclas["Shift"] && jogador.habilidades.dash.desbloqueada && jogador.habilidades.dash.cooldown===0) usarDash(dx,dy);
if(teclas["1"]) slotSelecionado = 0;
if(teclas["2"]) slotSelecionado = 1;
if(teclas["3"]) slotSelecionado = 2;
if(teclas["4"]) slotSelecionado = 3;
}

function atacar(){
if(jogador.slashCooldown>0) return;
jogador.slashCooldown = 15;

let dano = getDanoJogador();
let corArma = getCorArma();
let tamanho = getTamanhoSlash();
let acertou = false;

criarSlash(jogador.x, jogador.y, jogador.direcao, corArma, tamanho);

// Duplo ataque se desbloqueado
let ataques = 1;
if(jogador.habilidades.duploSlash.desbloqueada && Math.random()<0.3){
ataques = 2;
criarSlash(jogador.x - Math.cos(jogador.direcao)*30, jogador.y - Math.sin(jogador.direcao)*30, jogador.direcao + 0.2, corArma, tamanho*0.8);
}

for(let a=0;a<ataques;a++){
for(let i=0;i<8;i++){
let ang = jogador.direcao + (Math.random()-0.5)*1.2 + (a*0.2);
criarParticula(
jogador.x + Math.cos(ang)*50,
jogador.y + Math.sin(ang)*50,
corArma,
5 * tamanho,
{x:Math.cos(ang)*6, y:Math.sin(ang)*6},
10
);
}
}

inimigos.forEach(i=>{
if(distancia(jogador.x,jogador.y,i.x,i.y) < 90 + (15*tamanho)){
i.hp -= dano * (ataques===2?0.7:1);
jogador.estatisticas.danoCausado += dano;
jogador.estatisticas.maiorDano = Math.max(jogador.estatisticas.maiorDano, dano);
criarNumeroFlutuante(i.x,i.y-20,`-${dano}`, corArma, 22);
criarParticula(i.x,i.y, corArma, 8 * tamanho, {}, 12);
acertou = true;

let ang = Math.atan2(i.y - jogador.y, i.x - jogador.x);
i.x += Math.cos(ang) * 20 * tamanho;
i.y += Math.sin(ang) * 20 * tamanho;

// Efeito vampírico
let arma = getArmaEquipada();
if(arma && arma.vidaBonus){
jogador.hp = Math.min(jogador.maxHp, jogador.hp + Math.floor(dano*0.1));
}
}
});

if(chefe && distancia(jogador.x,jogador.y,chefe.x,chefe.y) < 120 + (25*tamanho)){
chefe.hp -= dano;
jogador.estatisticas.danoCausado += dano;
criarNumeroFlutuante(chefe.x,chefe.y-30,`-${dano}`, corArma, 26);
criarParticula(chefe.x,chefe.y, corArma, 12 * tamanho, {}, 18);
acertou = true;
}

if(acertou) tremorTela = 5;
}

function usarPocao(){
jogador.pocoes--;
jogador.hp = Math.min(jogador.maxHp, jogador.hp + 50);
jogador.pocaoCooldown = 120;
criarParticula(jogador.x,jogador.y,"#4aff4a",30,{x:0,y:-2},40);
criarNumeroFlutuante(jogador.x,jogador.y-30,"+50 HP","#4caf50");
}

function usarDash(dx,dy){
if(dx===0 && dy===0){
dx = Math.cos(jogador.direcao);
dy = Math.sin(jogador.direcao);
}
jogador.x += dx * 200;
jogador.y += dy * 200;
jogador.habilidades.dash.cooldown = 150;
for(let i=0;i<20;i++){
criarParticula(jogador.x, jogador.y, "#00ffff", 5, 
{x:dx*2 + (Math.random()-0.5)*2, y:dy*2 + (Math.random()-0.5)*2}, 20);
}
tremorTela = 8;
criarMensagem("Dash!", "#00ffff");
}

// ================= INIMIGOS =================
function atualizarInimigos(){
inimigos = inimigos.filter(i=>{
if(i.hp<=0){
jogador.estatisticas.inimigosMortos++;
jogador.xp += i.recompensaXp || 15;
jogador.ouro += aleatorioInt(5,15);
atualizarQuests("matar", 1);

if(Math.random() < 0.2){
let raridades = ["comum","raro","epico","lendario","mitico"];
let chances = [0.5,0.3,0.15,0.04,0.01];
let rand = Math.random();
let raridade = "comum";
let acum = 0;
for(let j=0;j<chances.length;j++){
acum += chances[j];
if(rand < acum){
raridade = raridades[j];
break;
}
}
let item = gerarItemComEfeito(aleatorioInt(0,1)?"arma":"armadura", raridade, masmorraSelecionada?.dificuldade||1);
jogador.inventario.push(item);
jogador.estatisticas.itensColetados++;
atualizarQuests("itens", 1);
criarMensagem(`${item.nome} obtido!`, coresRaridade[raridade]);
}

for(let p=0;p<15;p++){
criarParticula(i.x,i.y,i.cor,8,{x:aleatorio(-3,3),y:aleatorio(-3,3)},25);
}
return false;
}

let d = distancia(jogador.x, jogador.y, i.x, i.y);
i.animacao += 0.05;

if(i.tipo === "corpo"){
let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
i.x += Math.cos(ang) * i.velocidade;
i.y += Math.sin(ang) * i.velocidade;
if(d < 35 && i.cooldownAtual === 0){
danoJogador(i.dano);
i.cooldownAtual = 40;
}
}

if(i.tipo === "atirar"){
let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
if(d < 150){
i.x -= Math.cos(ang) * 1.5;
i.y -= Math.sin(ang) * 1.5;
}
i.cooldownAtual--;
if(i.cooldownAtual <= 0 && d < 400){
criarProjetil(i.x, i.y, ang, i.dano, "inimigo");
i.cooldownAtual = i.cooldown;
}
}

if(i.tipo === "elite"){
let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
i.x += Math.cos(ang) * 1.2;
i.y += Math.sin(ang) * 1.2;
if(i.cooldownAtual === 0 && d < 80){
danoJogador(i.dano * 1.5);
i.cooldownAtual = 60;
}
}

if(i.cooldownAtual > 0) i.cooldownAtual--;
return true;
});

if(inimigos.length === 0 && !chefe && !masmorraLimpa){
masmorraLimpa = true;
criarChefe();
}
}

// ================= PROJÉTEIS =================
function criarProjetil(x,y,ang,dano,origem){
projetesis.push({
x,y,
vx:Math.cos(ang)*5,
vy:Math.sin(ang)*5,
dano,
origem,
vida:120,
tamanho:5,
cor: origem==="jogador"?"#4aff4a":"#ff5555"
});
}

function atualizarProjeteis(){
projetesis = projetesis.filter(p=>{
p.x += p.vx;
p.y += p.vy;
p.vida--;

if(p.origem === "inimigo" && distancia(p.x,p.y,jogador.x,jogador.y) < 25){
danoJogador(p.dano);
return false;
}

if(p.origem === "jogador"){
for(let i of inimigos){
if(distancia(p.x,p.y,i.x,i.y) < 30){
i.hp -= p.dano;
criarNumeroFlutuante(i.x,i.y-20,`-${p.dano}`,"#ff5555");
return false;
}
}
if(chefe && distancia(p.x,p.y,chefe.x,chefe.y) < 50){
chefe.hp -= p.dano;
criarNumeroFlutuante(chefe.x,chefe.y-30,`-${p.dano}`,"#ffaa00");
return false;
}
}
return p.vida > 0 && p.x > 0 && p.x < 1100 && p.y > 0 && p.y < 650;
});
}

// ================= CHEFE =================
function atualizarChefe(){
if(!chefe || !masmorraSelecionada) return;

let d = distancia(jogador.x, jogador.y, chefe.x, chefe.y);
let ang = Math.atan2(jogador.y - chefe.y, jogador.x - chefe.x);

chefe.x += Math.cos(ang) * (chefe.enfurecido ? 1.8 : 1.2);
chefe.y += Math.sin(ang) * (chefe.enfurecido ? 1.8 : 1.2);

if(chefe.hp < chefe.hpMax/2 && !chefe.enfurecido){
chefe.enfurecido = true;
chefe.cor = "#ff4444";
chefe.dano *= 1.6;
criarMensagem(chefe.fala[1] || "ENFURECEU!", "#ff0000");
for(let i=0;i<30;i++){
criarParticula(chefe.x,chefe.y,"#ff0000",15,{x:aleatorio(-4,4),y:aleatorio(-4,4)},40);
}
}

chefe.cooldownAtaque--;
if(chefe.cooldownAtaque <= 0){
let ataque = chefe.ataques[chefe.padraoAtaque % chefe.ataques.length];
chefe.padraoAtaque++;

if(ataque === "investida" || ataque === "dash"){
chefe.x += Math.cos(ang) * 120;
chefe.y += Math.sin(ang) * 120;
tremorTela = 12;
if(d < 80) danoJogador(chefe.dano * 1.3);
criarMensagem("INVESTIDA!", chefe.cor);
}
if(ataque === "espinhos" || ataque === "projetil"){
for(let i=-1;i<=1;i+=2){
criarProjetil(chefe.x, chefe.y, ang + i*0.3, chefe.dano/2, "inimigo");
}
}
if(ataque === "bola de fogo" || ataque === "explosão"){
for(let i=0;i<3;i++){
criarProjetil(chefe.x, chefe.y, ang + (i-1)*0.2, chefe.dano, "inimigo");
}
}
if(ataque === "meteoro"){
for(let i=0;i<5;i++){
criarProjetil(chefe.x + aleatorio(-50,50), chefe.y - 50, Math.PI/2, chefe.dano, "inimigo");
}
criarMensagem("METEORO!", "#ff5500");
}
if(ataque === "nevasca"){
for(let i=0;i<8;i++){
criarParticula(chefe.x, chefe.y, "#aaddff", 10, {x:aleatorio(-4,4), y:aleatorio(-4,4)}, 30);
danoJogador(chefe.dano/3);
}
}
if(ataque === "relâmpago"){
tremorTela = 15;
danoJogador(chefe.dano);
criarMensagem("RELÂMPAGO!", "#ffff00");
}

chefe.cooldownAtaque = chefe.enfurecido ? 40 : 60;
}

if(d < 50 && chefe.cooldownAtaque%10 === 0){
danoJogador(chefe.dano);
}

if(chefe.hp <= 0){
jogador.estatisticas.chefesDerrotados++;
jogador.estatisticas.masmorrasCompletadas++;
jogador.xp += 200 * masmorraSelecionada.dificuldade;
jogador.ouro += 150 * masmorraSelecionada.dificuldade;
atualizarQuests("chefe", 1);
criarMensagem("CHEFE DERROTADO! 🏆", "#ffd700");
for(let i=0;i<50;i++){
criarParticula(chefe.x,chefe.y,"#ffd700",15,{x:aleatorio(-5,5),y:aleatorio(-5,5)},40);
}
darLoot(4, chefe.x, chefe.y);
estado = "lobby";
canvas.style.background = "#0a0f1a";
chefe = null;
}
}

// ================= DANO =================
function danoJogador(quantidade){
if(jogador.iframe>0) return;
let danoFinal = calcularDanoRecebido(quantidade);
jogador.hp -= danoFinal;
jogador.iframe = 25;
tremorTela = 8;
criarNumeroFlutuante(jogador.x,jogador.y-30,`-${danoFinal}`,"#ff0000",26);
for(let i=0;i<10;i++){
criarParticula(jogador.x,jogador.y,"#f00",6,{x:aleatorio(-3,3),y:aleatorio(-3,3)},12);
}
}

// ================= ITENS E LOOT =================
function darLoot(quantidade, x, y){
for(let l=0;l<quantidade;l++){
let raridades = ["comum","raro","epico","lendario","mitico"];
let chances = [0.4,0.3,0.2,0.08,0.02];
let rand = Math.random();
let raridade = "comum";
let acum = 0;
for(let i=0;i<chances.length;i++){
acum += chances[i];
if(rand < acum){
raridade = raridades[i];
break;
}
}

let tipoSorteado = Math.random();
let tipo;
if(tipoSorteado < 0.4) tipo = "arma";
else if(tipoSorteado < 0.7) tipo = "armadura";
else if(tipoSorteado < 0.9) tipo = "amuleto";
else tipo = "anel";

let item = gerarItemComEfeito(tipo, raridade, masmorraSelecionada?.dificuldade||1);
jogador.inventario.push(item);
jogador.estatisticas.itensColetados++;
atualizarQuests("itens", 1);
criarMensagem(`${item.nome} obtido!`, coresRaridade[raridade]);
criarParticula(x || jogador.x, y || jogador.y, coresRaridade[raridade], 15, {}, 30);
}
}

function equiparItem(indexInventario){
let item = jogador.inventario[indexInventario];
if(!item) return;

let slot;
if(item.tipo === "arma") slot = 0;
else if(item.tipo === "armadura") slot = 1;
else if(item.tipo === "amuleto") slot = 2;
else if(item.tipo === "anel") slot = 3;
else return;

if(jogador.equipamento[slot]){
jogador.inventario.push(jogador.equipamento[slot]);
}
jogador.equipamento[slot] = item;
jogador.inventario.splice(indexInventario, 1);

// Aplicar bônus de atributos
if(item.forcaBonus) jogador.atributos.forca += item.forcaBonus;
if(item.agilidadeBonus) jogador.atributos.agilidade += item.agilidadeBonus;
if(item.constituicaoBonus) jogador.atributos.constituicao += item.constituicaoBonus;

criarMensagem(`${item.nome} equipado!`, coresRaridade[item.raridade]);
}

// ================= DESENHAR =================
function desenhar(){
ctx.save();

if(estado === "dungeon"){
let tremerX = (Math.random()-0.5)*tremorTela;
let tremerY = (Math.random()-0.5)*tremorTela;
ctx.translate(-camera.x + tremerX, -camera.y + tremerY);
} else {
ctx.translate(0, 0);
}

if(estado==="lobby"){
desenharLobby();
}
if(estado==="dungeon"){
desenharMasmorra();
}

ctx.restore();
desenharUI();
}

function desenharMasmorra(){
if(!masmorraSelecionada) return;

ctx.fillStyle = masmorraSelecionada.corFundo;
ctx.fillRect(-100,-100,canvas.width*2,canvas.height*2);

ctx.strokeStyle = masmorraSelecionada.cor + "33";
ctx.lineWidth = 1;
for(let i=-200;i<canvas.width+200;i+=70){
ctx.beginPath();
ctx.moveTo(i,-100);
ctx.lineTo(i,canvas.height+100);
ctx.strokeStyle = masmorraSelecionada.cor + "22";
ctx.stroke();
}
for(let i=-200;i<canvas.height+200;i+=70){
ctx.beginPath();
ctx.moveTo(-100,i);
ctx.lineTo(canvas.width+100,i);
ctx.stroke();
}

slashes.forEach(s=>{
let alpha = s.vida/s.vidaMax;
ctx.save();
ctx.translate(s.x, s.y);
ctx.rotate(s.direcao);
ctx.globalAlpha = alpha * 0.8;
ctx.fillStyle = s.cor;
ctx.shadowBlur = 20;
ctx.shadowColor = s.cor;

ctx.beginPath();
ctx.moveTo(0, -s.largura/2);
ctx.quadraticCurveTo(s.comprimento/2, -s.largura/2 - 10, s.comprimento, -s.largura/2);
ctx.lineTo(s.comprimento, s.largura/2);
ctx.quadraticCurveTo(s.comprimento/2, s.largura/2 + 10, 0, s.largura/2);
ctx.closePath();
ctx.fill();
ctx.restore();
});

projetesis.forEach(p=>{
ctx.fillStyle = p.cor;
ctx.shadowBlur = 15;
ctx.shadowColor = p.cor;
ctx.beginPath();
ctx.arc(p.x, p.y, p.tamanho, 0, Math.PI*2);
ctx.fill();
});

inimigos.forEach(i=>{
ctx.fillStyle = i.cor;
ctx.shadowBlur = 25;
ctx.shadowColor = i.cor;
ctx.beginPath();
ctx.arc(i.x, i.y, 18 + Math.sin(i.animacao)*2, 0, Math.PI*2);
ctx.fill();

ctx.shadowBlur = 0;
ctx.fillStyle = "#000";
ctx.fillRect(i.x-25, i.y-35, 50, 5);
ctx.fillStyle = "#f00";
ctx.fillRect(i.x-25, i.y-35, 50 * (i.hp/i.hpMax), 5);
});

if(chefe){
ctx.fillStyle = chefe.cor;
ctx.shadowBlur = 50;
ctx.shadowColor = chefe.enfurecido?"#f00":"#a0f";
ctx.beginPath();
ctx.arc(chefe.x, chefe.y, 45 + Math.sin(tempoJogo*0.1)*5, 0, Math.PI*2);
ctx.fill();

ctx.shadowBlur = 0;
ctx.font = "bold 24px Arial";
ctx.fillStyle = "#fff";
ctx.fillText(chefe.nome, chefe.x-100, chefe.y-80);
ctx.fillStyle = "#000";
ctx.fillRect(chefe.x-120, chefe.y-60, 240, 20);
ctx.fillStyle = "#f00";
ctx.fillRect(chefe.x-120, chefe.y-60, 240 * (chefe.hp/chefe.hpMax), 20);
}

ctx.shadowBlur = 40;
ctx.shadowColor = jogador.iframe>0 ? "#f00" : getCorArma();
ctx.fillStyle = jogador.iframe>0 ? "#ff8888" : "#44aaff";

ctx.beginPath();
ctx.arc(jogador.x, jogador.y, 22 + Math.sin(jogador.animacao)*2, 0, Math.PI*2);
ctx.fill();

let arma = getArmaEquipada();
if(arma){
ctx.beginPath();
ctx.moveTo(jogador.x, jogador.y);
ctx.lineTo(jogador.x + Math.cos(jogador.direcao)*45, jogador.y + Math.sin(jogador.direcao)*45);
ctx.strokeStyle = arma.corEfeito || coresRaridade[arma.raridade];
ctx.lineWidth = 6;
ctx.shadowBlur = 20;
ctx.stroke();
}

particulas.forEach(p=>{
ctx.globalAlpha = p.vida/p.vidaMax;
ctx.fillStyle = p.cor;
ctx.beginPath();
ctx.arc(p.x, p.y, p.tamanho * (p.vida/p.vidaMax), 0, Math.PI*2);
ctx.fill();
});

numerosFlutuantes.forEach(n=>{
ctx.globalAlpha = n.vida/60;
ctx.font = `bold ${n.tamanho}px Arial`;
ctx.fillStyle = n.cor;
ctx.fillText(n.texto, n.x, n.y);
});
ctx.globalAlpha = 1;
ctx.shadowBlur = 0;
}

function desenharUI(){
ctx.save();
ctx.setTransform(1,0,0,1,0,0);

ctx.fillStyle = "#333";
ctx.fillRect(20,20,300,30);
ctx.fillStyle = "#f00";
ctx.fillRect(20,20,300 * (jogador.hp/jogador.maxHp),30);
ctx.fillStyle = "#fff";
ctx.font = "bold 18px Arial";
ctx.fillText(`❤️ ${Math.floor(jogador.hp)}/${jogador.maxHp}`, 140, 45);

ctx.fillStyle = "#333";
ctx.fillRect(330,20,120,30);
ctx.fillStyle = "#0f0";
ctx.fillRect(330,20,120 * (jogador.pocaoCooldown?0:jogador.pocoes/5),30);
ctx.fillText(`🧪 x${jogador.pocoes}`, 360, 45);

ctx.fillStyle = "#333";
ctx.fillRect(20,60,300,15);
ctx.fillStyle = "#ffd700";
ctx.fillRect(20,60,300 * (jogador.xp/(jogador.nivel*100)),15);

ctx.fillStyle = "#fff";
ctx.font = "16px Arial";
ctx.fillText(`Nível ${jogador.nivel}`, 330, 75);
ctx.fillText(`🪙 ${jogador.ouro}`, 440, 75);

let arma = getArmaEquipada();
if(arma){
ctx.fillStyle = arma.corEfeito || coresRaridade[arma.raridade];
ctx.fillRect(470,20,200,40);
ctx.fillStyle = "#fff";
ctx.font = "bold 14px Arial";
ctx.fillText(`${arma.nome.substring(0,12)} +${arma.poder}`, 480, 45);
if(arma.descEfeito){
ctx.font = "10px Arial";
ctx.fillText(arma.descEfeito, 480, 65);
}
}

if(mensagemTemporaria.tempo > 0){
ctx.globalAlpha = mensagemTemporaria.tempo/120;
ctx.font = "bold 36px Arial";
ctx.fillStyle = mensagemTemporaria.cor;
ctx.shadowBlur = 20;
ctx.shadowColor = mensagemTemporaria.cor;
ctx.fillText(mensagemTemporaria.texto, canvas.width/2-150, canvas.height/2-50);
ctx.shadowBlur = 0;
ctx.globalAlpha = 1;
}

if(mensagemQuest.tempo > 0){
ctx.globalAlpha = mensagemQuest.tempo/180;
ctx.font = "bold 24px Arial";
ctx.fillStyle = mensagemQuest.cor;
ctx.fillText(mensagemQuest.texto, canvas.width/2-150, canvas.height/2-100);
ctx.globalAlpha = 1;
}

if(estado==="dungeon" && masmorraSelecionada){
ctx.fillStyle = masmorraSelecionada.cor;
ctx.fillRect(20,100,200,50);
ctx.fillStyle = "#fff";
ctx.font = "bold 16px Arial";
ctx.fillText(masmorraSelecionada.nome, 30, 135);
ctx.fillText(`👥 ${inimigos.length}`, 30, 165);
if(chefe) ctx.fillText("BOSS ATIVO!", 30, 195);
}

ctx.fillStyle = "rgba(0,0,0,0.5)";
ctx.fillRect(canvas.width-220, canvas.height-100, 200, 80);
ctx.fillStyle = "#fff";
ctx.font = "12px Arial";
ctx.fillText("ESPAÇO: Atacar", canvas.width-210, canvas.height-70);
ctx.fillText("Q: Poção", canvas.width-210, canvas.height-55);
ctx.fillText("SHIFT: Dash", canvas.width-210, canvas.height-40);
ctx.fillText("1-4: Slots", canvas.width-210, canvas.height-25);

ctx.restore();
}

// ================= LOOP =================
function loop(){
atualizar();
desenhar();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
