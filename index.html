// ================= HELPERS =================
function aleatorio(min,max){return Math.random()*(max-min)+min;}
function aleatorioInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function distancia(x1,y1,x2,y2){return Math.hypot(x1-x2,y1-y2);}

function getDefesa(){
let armaduraDef = jogador.equipamento[1] ? jogador.equipamento[1].poder : 0;
let skillDef = jogador.skillTree.defesa.armadura.nivel * jogador.skillTree.defesa.armadura.bonus;
return jogador.defesaBase + armaduraDef + skillDef + (jogador.atributos.constituicao * 0.5);
}

function getVidaMax(){
let base = 100 + (jogador.nivel * 10);
let skillVida = jogador.skillTree.defesa.vida.nivel * jogador.skillTree.defesa.vida.bonus;
return base + skillVida + (jogador.atributos.constituicao * 5);
}

function getDanoJogador(){
let base = jogador.danoBase + (jogador.nivel * 3) + (jogador.atributos.forca * 2);
let skillDano = jogador.skillTree.combate.danoFisico.nivel * jogador.skillTree.combate.danoFisico.bonus;
let arma = getArmaEquipada();
if(arma) base += arma.poder;
base += skillDano;

let chanceCritico = 0.1 + (jogador.atributos.agilidade * 0.01) + 
                   (jogador.skillTree.combate.critico.nivel * jogador.skillTree.combate.critico.bonus);
                   
if(Math.random() < chanceCritico){
criarMensagem("CRÍTICO!", "#ffaa00");
return Math.floor(base * 2);
}

// Efeito especial da arma
if(arma && arma.efeito && Math.random() < 0.2){
    criarMensagem(arma.efeito.nome + "!", arma.efeito.cor);
    return Math.floor((base + arma.efeito.dano) * 1.2);
}

return Math.floor(base * aleatorio(0.9,1.1));
}

function getVelocidade(){
let base = jogador.velocidade;
let skillVel = jogador.skillTree.agilidade.velocidade.nivel * jogador.skillTree.agilidade.velocidade.bonus;
return base + skillVel + (jogador.atributos.agilidade * 0.2);
}

// ================= SISTEMA DE PARTÍCULAS =================
function criarParticula(x,y,cor,tamanho=3,velocidade={x:0,y:0},vida=30){
for(let i=0;i<3;i++){
particulas.push({
x:x + (Math.random()-0.5)*10,
y:y + (Math.random()-0.5)*10,
cor,
tamanho:tamanho * aleatorio(0.5,1.5),
vx:velocidade.x + (Math.random()-0.5)*3,
vy:velocidade.y + (Math.random()-0.5)*3,
vida:vida + aleatorioInt(-5,5),
vidaMax:vida,
});
}
}

function criarSlash(x,y,direcao,cor,tamanho=1.0){
let comprimento = 70 * tamanho;
let largura = 40 * tamanho;
slashes.push({
x: x + Math.cos(direcao) * 35,
y: y + Math.sin(direcao) * 35,
direcao: direcao,
comprimento: comprimento,
largura: largura,
cor: cor,
vida: 8,
vidaMax: 8
});
}

function criarNumeroFlutuante(x,y,texto,cor="#fff",tamanho=20){
numerosFlutuantes.push({
x,y,texto,cor,
vida:60,
vx:(Math.random()-0.5)*0.8,
vy:-1.8,
tamanho
});

function criarMensagem(texto,cor="#fff"){

}

// ================= SKILL TREE =================
function comprarSkill(categoria, skill){
let skillRef = jogador.skillTree[categoria][skill];
if(!skillRef) return false;
if(skillRef.nivel >= skillRef.max) return false;
if(pontosSkill <= 0) return false;

skillRef.nivel++;
pontosSkill--;

// Desbloquear habilidade se for o caso
if(skillRef.desbloqueia){
    jogador.habilidades[skillRef.desbloqueia].desbloqueada = true;
    criarMensagem(`Habilidade ${skillRef.desbloqueia} desbloqueada!`, "#ffff00");
}

criarMensagem(`Skill ${skill} aumentada!`, "#4aff4a");
return true;
}

// ================= ATUALIZAR QUESTS =================
function atualizarQuest(tipo, quantidade=1){
questsAtivas.forEach(q => {
    if(!q.completada && q.tipo === tipo){
        q.progresso += quantidade;
        if(q.progresso >= q.objetivo){
            q.completada = true;
            jogador.xp += q.recompensa.xp || 0;
            jogador.ouro += q.recompensa.ouro || 0;
            if(q.recompensa.skillPoint) pontosSkill += q.recompensa.skillPoint;
            if(q.recompensa.habilidade) {
                jogador.habilidades[q.recompensa.habilidade].desbloqueada = true;
            }
            criarMensagem(`Quest Completa: ${q.nome}!`, "#ffd700");
        }
    }
});
}

// ================= INICIAR MASMORRA =================
function iniciarMasmorra(m){
masmorraSelecionada=m;
estado="dungeon";
inimigos=[];
chefe=null;
masmorraLimpa=false;
tremorTela=0;
efeitoMasmorra = m.efeitoAmbiente;

canvas.style.background = m.corFundo;

jogador.x = canvas.width/2;
jogador.y = canvas.height/2;
camera.x = 0;
camera.y = 0;

for(let i=0;i<m.inimigosBase;i++){
let tipo = Math.random()>0.7 ? "atirar" : "corpo";
let hpInimigo = 20 * m.dificuldade * (m.chefe.hpBonus || 1);
let danoInimigo = 5 * m.dificuldade * (m.chefe.danoBonus || 1);

inimigos.push({
x:aleatorio(150,950),
y:aleatorio(100,500),
hp:hpInimigo,
hpMax:hpInimigo,
dano:danoInimigo,
tipo:tipo,
velocidade: tipo==="corpo"?2:1.2,
cooldown:aleatorioInt(40,80),
cooldownAtual:0,
animacao:0,
cor: m.cor,
tema: m.nome,
recompensaXp:10 * m.dificuldade
});
}

if(m.dificuldade >= 3){
inimigos.push({
x:aleatorio(400,700),
y:aleatorio(150,350),
hp:120 * m.dificuldade,
hpMax:120 * m.dificuldade,
dano:10 * m.dificuldade,
tipo:"elite",
velocidade:1.5,
animacao:0,
cor: m.chefe.cor,
tema: m.nome,
recompensaXp:30 * m.dificuldade
});
}

criarMensagem(`Entrou em ${m.nome}`, m.cor);
}

// ================= ATUALIZAR =================
function atualizar(){
tempoJogo++;

if(estado==="dungeon"){
camera.x += (jogador.x - canvas.width/2 - camera.x) * 0.1;
camera.y += (jogador.y - canvas.height/2 - camera.y) * 0.1;

atualizarJogador();
atualizarInimigos();
atualizarChefe();
atualizarProjeteis();
atualizarEfeitoMasmorra();
}

// Cooldowns
if(jogador.iframe>0) jogador.iframe--;
if(jogador.slashCooldown>0) jogador.slashCooldown--;
if(jogador.pocaoCooldown>0) jogador.pocaoCooldown--;
Object.keys(jogador.habilidades).forEach(h => {
    if(jogador.habilidades[h].cooldown > 0) jogador.habilidades[h].cooldown--;
});
if(mensagemTemporaria.tempo>0) mensagemTemporaria.tempo--;

atualizarParticulas(); // Nome corrigido (agora corresponde à função definida)
atualizarSlashes();
atualizarNumeros();

if(tremorTela > 0) tremorTela--;

// Atualizar vida máxima
jogador.maxHp = getVidaMax();

if(jogador.hp <= 0){
jogador.hp = jogador.maxHp;
jogador.x = 550;
jogador.y = 500;
estado = "lobby";
tremorTela = 0;
canvas.style.background = "#0a0f1a";
criarMensagem("Você morreu...", "#ff0000");
}
}

// Função atualizarParticulas (corrigida)
function atualizarParticulas(){
for(let i=particulas.length-1; i>=0; i--){
    let p = particulas[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vida--;
    if(p.vida <= 0){
        particulas.splice(i,1);
    }
}
}

function atualizarSlashes(){
for(let i=slashes.length-1; i>=0; i--){
    slashes[i].vida--;
    if(slashes[i].vida <= 0){
        slashes.splice(i,1);
    }
}
}

function atualizarNumeros(){
for(let i=numerosFlutuantes.length-1; i>=0; i--){
    let n = numerosFlutuantes[i];
    n.x += n.vx;
    n.y += n.vy;
    n.vida--;
    if(n.vida <= 0){
        numerosFlutuantes.splice(i,1);
    }
}
}

function atualizarEfeitoMasmorra(){
if(efeitoMasmorra === "fogo" && tempoJogo % 60 === 0){
    if(Math.random() < 0.1){
        criarParticula(jogador.x + aleatorio(-50,50), jogador.y + aleatorio(-50,50), "#ff6600", 5);
    }
} else if(efeitoMasmorra === "gelo" && tempoJogo % 30 === 0){
    if(Math.random() < 0.05){
        jogador.velocidade = Math.max(2, jogador.velocidade * 0.95);
    }
} else if(efeitoMasmorra === "trovão" && tempoJogo % 120 === 0){
    if(Math.random() < 0.2){
        tremorTela = 10;
    }
}
}

// ================= JOGADOR =================
function atualizarJogador(){
let dx=0,dy=0;
if(teclas["w"]||teclas["ArrowUp"])dy--;
if(teclas["s"]||teclas["ArrowDown"])dy++;
if(teclas["a"]||teclas["ArrowLeft"])dx--;
if(teclas["d"]||teclas["ArrowRight"])dx++;

let velocidade = getVelocidade();

if(dx||dy){
let len=Math.hypot(dx,dy);
dx/=len; dy/=len;
jogador.x+=dx*velocidade;
jogador.y+=dy*velocidade;
jogador.direcao=Math.atan2(dy,dx);
jogador.animacao+=0.2;

if(tempoJogo % 5 === 0){
criarParticula(jogador.x, jogador.y, "#aaa", 2, 
{x:-dx*1, y:-dy*1}, 8);
}
}

jogador.x = Math.max(50, Math.min(1050, jogador.x));
jogador.y = Math.max(50, Math.min(600, jogador.y));

if(teclas[" "]) atacar();
if(teclas["q"] && jogador.pocoes>0 && jogador.pocaoCooldown===0) usarPocao();
if(teclas["Shift"] && jogador.habilidades.dash.desbloqueada && jogador.habilidades.dash.cooldown===0) {
    usarDash(dx,dy);
    atualizarQuest("dash");
}
if(teclas["1"]) slotSelecionado = 0;
if(teclas["2"]) slotSelecionado = 1;
if(teclas["3"]) slotSelecionado = 2;
if(teclas["4"]) slotSelecionado = 3;
}

function atacar(){
if(jogador.slashCooldown>0) return;
jogador.slashCooldown = 15;

let dano = getDanoJogador();
let corArma = getCorArma();
let tamanho = getTamanhoSlash();
let acertou = false;

criarSlash(jogador.x, jogador.y, jogador.direcao, corArma, tamanho);

for(let i=0;i<8;i++){
let ang = jogador.direcao + (Math.random()-0.5)*1.2;
criarParticula(
jogador.x + Math.cos(ang)*50,
jogador.y + Math.sin(ang)*50,
corArma,
5 * tamanho,
{x:Math.cos(ang)*6, y:Math.sin(ang)*6},
10
);
}

inimigos.forEach(i=>{
if(distancia(jogador.x,jogador.y,i.x,i.y) < 90 + (15*tamanho)){
i.hp -= dano;
jogador.estatisticas.danoCausado += dano;
jogador.estatisticas.maiorDano = Math.max(jogador.estatisticas.maiorDano, dano);
criarNumeroFlutuante(i.x,i.y-20,`-${dano}`, corArma, 22);
criarParticula(i.x,i.y, corArma, 8 * tamanho, {}, 12);
acertou = true;

let ang = Math.atan2(i.y - jogador.y, i.x - jogador.x);
i.x += Math.cos(ang) * 20 * tamanho;
i.y += Math.sin(ang) * 20 * tamanho;
}
});

if(chefe && distancia(jogador.x,jogador.y,chefe.x,chefe.y) < 120 + (25*tamanho)){
chefe.hp -= dano;
jogador.estatisticas.danoCausado += dano;
criarNumeroFlutuante(chefe.x,chefe.y-30,`-${dano}`, corArma, 26);
criarParticula(chefe.x,chefe.y, corArma, 12 * tamanho, {}, 18);
acertou = true;
}

if(acertou) tremorTela = 5;
}

function usarPocao(){
jogador.pocoes--;
jogador.hp = Math.min(jogador.maxHp, jogador.hp + 50);
jogador.pocaoCooldown = 120;
criarParticula(jogador.x,jogador.y,"#4aff4a",30,{x:0,y:-2},40);
criarNumeroFlutuante(jogador.x,jogador.y-30,"+50 HP","#4caf50");
}

function usarDash(dx,dy){
if(dx===0 && dy===0){
dx = Math.cos(jogador.direcao);
dy = Math.sin(jogador.direcao);
}
jogador.x += dx * 200;
jogador.y += dy * 200;
jogador.habilidades.dash.cooldown = 150;
for(let i=0;i<20;i++){
criarParticula(jogador.x, jogador.y, "#00ffff", 5, 
{x:dx*2 + (Math.random()-0.5)*2, y:dy*2 + (Math.random()-0.5)*2}, 20);
}
tremorTela = 8;
criarMensagem("Dash!", "#00ffff");
}

// ================= INIMIGOS =================
function atualizarInimigos(){
inimigos = inimigos.filter(i=>{
if(i.hp<=0){
jogador.estatisticas.inimigosMortos++;
jogador.xp += i.recompensaXp || 15;
jogador.ouro += aleatorioInt(5,15);
atualizarQuest("matar");
if(Math.random() < 0.15) darLoot(1, i.x, i.y);
for(let p=0;p<15;p++){
criarParticula(i.x,i.y,i.cor,8,{x:aleatorio(-3,3),y:aleatorio(-3,3)},25);
}
return false;
}

let d = distancia(jogador.x, jogador.y, i.x, i.y);
i.animacao += 0.05;

if(i.tipo === "corpo"){
let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
i.x += Math.cos(ang) * i.velocidade;
i.y += Math.sin(ang) * i.velocidade;
if(d < 35 && i.cooldownAtual === 0){
danoJogador(i.dano);
i.cooldownAtual = 40;
}
}

if(i.tipo === "atirar"){
let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
if(d < 150){
i.x -= Math.cos(ang) * 1.5;
i.y -= Math.sin(ang) * 1.5;
}
i.cooldownAtual--;
if(i.cooldownAtual <= 0 && d < 400){
criarProjetil(i.x, i.y, ang, i.dano, "inimigo");
i.cooldownAtual = i.cooldown;
}
}

if(i.tipo === "elite"){
let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
i.x += Math.cos(ang) * 1.2;
i.y += Math.sin(ang) * 1.2;
if(i.cooldownAtual === 0 && d < 80){
danoJogador(i.dano * 1.5);
i.cooldownAtual = 60;
}
}

if(i.cooldownAtual > 0) i.cooldownAtual--;
return true;
});

if(inimigos.length === 0 && !chefe && !masmorraLimpa){
masmorraLimpa = true;
criarChefe();
}
}

// ================= PROJÉTEIS =================
function criarProjetil(x,y,ang,dano,origem){
projetesis.push({
x,y,
vx:Math.cos(ang)*5,
vy:Math.sin(ang)*5,
dano,
origem,
vida:120,
tamanho:5,
cor: origem==="jogador"?"#4aff4a":"#ff5555"
});
}

function atualizarProjeteis(){
projetesis = projetesis.filter(p=>{
p.x += p.vx;
p.y += p.vy;
p.vida--;

if(p.origem === "inimigo" && distancia(p.x,p.y,jogador.x,jogador.y) < 25){
danoJogador(p.dano);
return false;
}

if(p.origem === "jogador"){
for(let i of inimigos){
if(distancia(p.x,p.y,i.x,i.y) < 30){
i.hp -= p.dano;
criarNumeroFlutuante(i.x,i.y-20,`-${p.dano}`,"#ff5555");
return false;
}
}
if(chefe && distancia(p.x,p.y,chefe.x,chefe.y) < 50){
chefe.hp -= p.dano;
criarNumeroFlutuante(chefe.x,chefe.y-30,`-${p.dano}`,"#ffaa00");
return false;
}
}
return p.vida > 0 && p.x > 0 && p.x < 1100 && p.y > 0 && p.y < 650;
});
}

// ================= CHEFE =================
function criarChefe(){
if(!masmorraSelecionada) return;

let m = masmorraSelecionada;
chefe={
nome: m.chefe.nome,
x:aleatorio(400,700),
y:aleatorio(150,300),
hp:Math.floor(400 * m.dificuldade * m.chefe.hpBonus),
hpMax:Math.floor(400 * m.dificuldade * m.chefe.hpBonus),
dano:Math.floor(18 * m.dificuldade * m.chefe.danoBonus),
cooldownDash:100,
fase:1,
cooldownAtaque:0,
enfurecido:false,
cor: m.chefe.cor,
fala: m.chefe.fala,
ataques: m.chefe.ataques,
ultimoAtaque: 0,
padraoAtaque: 0
};

for(let i=0;i<10;i++){
criarParticula(chefe.x,chefe.y,chefe.cor,20,{x:aleatorio(-2,2),y:aleatorio(-2,2)},40);
}
criarMensagem(`⚔️ ${chefe.nome} APARECEU! ⚔️`, chefe.cor);
}

function atualizarChefe(){
if(!chefe || !masmorraSelecionada) return;

let d = distancia(jogador.x, jogador.y, chefe.x, chefe.y);
let ang = Math.atan2(jogador.y - chefe.y, jogador.x - chefe.x);

chefe.x += Math.cos(ang) * (chefe.enfurecido ? 1.8 : 1.2);
chefe.y += Math.sin(ang) * (chefe.enfurecido ? 1.8 : 1.2);

if(chefe.hp < chefe.hpMax/2 && !chefe.enfurecido){
chefe.enfurecido = true;
chefe.cor = "#ff4444";
chefe.dano *= 1.6;
criarMensagem(chefe.fala[1] || "ENFURECEU!", "#ff0000");
for(let i=0;i<30;i++){
criarParticula(chefe.x,chefe.y,"#ff0000",15,{x:aleatorio(-4,4),y:aleatorio(-4,4)},40);
}
}

chefe.cooldownAtaque--;
if(chefe.cooldownAtaque <= 0){
let ataque = chefe.ataques[chefe.padraoAtaque % chefe.ataques.length];
chefe.padraoAtaque++;

if(ataque === "investida" || ataque === "dash"){
chefe.x += Math.cos(ang) * 120;
chefe.y += Math.sin(ang) * 120;
tremorTela = 12;
if(d < 80) danoJogador(chefe.dano * 1.3);
criarMensagem("INVESTIDA!", chefe.cor);
}
if(ataque === "espinhos" || ataque === "projetil"){
for(let i=-1;i<=1;i+=2){
criarProjetil(chefe.x, chefe.y, ang + i*0.3, chefe.dano/2, "inimigo");
}
}
if(ataque === "bola de fogo" || ataque === "explosão"){
for(let i=0;i<3;i++){
criarProjetil(chefe.x, chefe.y, ang + (i-1)*0.2, chefe.dano, "inimigo");
}
}
if(ataque === "meteoro"){
for(let i=0;i<5;i++){
criarProjetil(chefe.x + aleatorio(-50,50), chefe.y - 50, Math.PI/2, chefe.dano, "inimigo");
}
criarMensagem("METEORO!", "#ff5500");
}
if(ataque === "nevasca"){
for(let i=0;i<8;i++){
criarParticula(chefe.x, chefe.y, "#aaddff", 10, {x:aleatorio(-4,4), y:aleatorio(-4,4)}, 30);
danoJogador(chefe.dano/3);
}
}
if(ataque === "relâmpago"){
tremorTela = 15;
danoJogador(chefe.dano);
criarMensagem("RELÂMPAGO!", "#ffff00");
}

chefe.cooldownAtaque = chefe.enfurecido ? 40 : 60;
}

if(d < 50 && chefe.cooldownAtaque%10 === 0){
danoJogador(chefe.dano);
}

if(chefe.hp <= 0){
jogador.estatisticas.chefesDerrotados++;
jogador.estatisticas.masmorrasCompletadas++;
jogador.xp += 200 * masmorraSelecionada.dificuldade;
jogador.ouro += 150 * masmorraSelecionada.dificuldade;
criarMensagem("CHEFE DERROTADO! 🏆", "#ffd700");
for(let i=0;i<50;i++){
criarParticula(chefe.x,chefe.y,"#ffd700",15,{x:aleatorio(-5,5),y:aleatorio(-5,5)},40);
}
darLoot(4, chefe.x, chefe.y);
estado = "lobby";
canvas.style.background = "#0a0f1a";
chefe = null;
}
}

// ================= DANO =================
function danoJogador(quantidade){
if(jogador.iframe>0) return;

// Chance de esquiva
let chanceEsquiva = jogador.skillTree.agilidade.esquiva.nivel * jogador.skillTree.agilidade.esquiva.bonus;
if(Math.random() < chanceEsquiva){
    criarMensagem("ESQUIVOU!", "#00ffff");
    return;
}

let danoFinal = quantidade - (getDefesa() * 0.5);
danoFinal = Math.max(1, Math.floor(danoFinal * aleatorio(0.9,1.1)));

jogador.hp -= danoFinal;
jogador.iframe = 25;
tremorTela = 8;
criarNumeroFlutuante(jogador.x,jogador.y-30,`-${danoFinal}`,"#ff0000",26);
for(let i=0;i<10;i++){
criarParticula(jogador.x,jogador.y,"#f00",6,{x:aleatorio(-3,3),y:aleatorio(-3,3)},12);
}
}

// ================= ITENS E LOOT =================
function darLoot(quantidade, x, y){
for(let l=0;l<quantidade;l++){
let raridades = ["comum","raro","epico","lendario","mitico"];
let chances = [0.4,0.3,0.2,0.08,0.02];
let rand = Math.random();
let raridade = "comum";
let acum = 0;
for(let i=0;i<chances.length;i++){
acum += chances[i];
if(rand < acum){
raridade = raridades[i];
break;
}
}

let tipo = Math.random()>0.6 ? "arma" : (Math.random()>0.5 ? "armadura" : "acessorio");
let poder = tipo === "arma" ? 
aleatorioInt(8,25)*multiplicadorRaridade[raridade] :
tipo === "armadura" ?
aleatorioInt(5,18)*multiplicadorRaridade[raridade] :
aleatorioInt(3,12)*multiplicadorRaridade[raridade];

let item = {
tipo,
poder: Math.floor(poder),
raridade,
nome: gerarNomeItem(tipo, raridade),
efeito: Math.random() < 0.3 ? efeitosEspeciais[Math.floor(Math.random() * efeitosEspeciais.length)] : null,
descricao: gerarDescricaoItem(tipo, raridade)
};

jogador.inventario.push(item);

if(item.raridade === "raro" || item.raridade === "epico" || item.raridade === "lendario"){
    atualizarQuest("itensRaros");
}

criarMensagem(`${item.nome} obtido!`, coresRaridade[raridade]);
criarParticula(x || jogador.x, y || jogador.y, coresRaridade[raridade], 15, {}, 30);
}
}

function gerarNomeItem(tipo, raridade){
let prefixos = {
comum:["Simples","Básico","Velho","Enferrujado"],
raro:["Refinado","Afiado","Forte","Preciso"],
epico:["Épico","Místico","Encantado","Sombrio"],
lendario:["Lendário","Ancião","Divino","Eterno"],
mitico:["Mítico","Primordial","Cósmico","Absoluto"]
};

let armas = ["Espada","Machado","Adaga","Arco","Cajado","Martelo","Lança","Foice","Katana","Clava"];
let armaduras = ["Elmo","Peitoral","Botas","Luvas","Cinto","Ombreira","Grevas","Colar"];
let acessorios = ["Anel","Amuleto","Bracelete","Cinto","Capa","Tiara","Broche","Gema"];

let lista;
if(tipo === "arma") lista = armas;
else if(tipo === "armadura") lista = armaduras;
else lista = acessorios;

let prefixo = prefixos[raridade][Math.floor(Math.random() * prefixos[raridade].length)];
let nomeBase = lista[Math.floor(Math.random() * lista.length)];

return `${prefixo} ${nomeBase}`;
}

function gerarDescricaoItem(tipo, raridade){
let descs = {
arma: "Aumenta o dano causado",
armadura: "Aumenta a defesa",
acessorio: "Concede efeitos especiais"
};

let bonusDesc = "";
if(raridade === "raro") bonusDesc = " (Raro)";
else if(raridade === "epico") bonusDesc = " (Épico)";
else if(raridade === "lendario") bonusDesc = " (Lendário)";
else if(raridade === "mitico") bonusDesc = " (Mítico)";

return descs[tipo] + bonusDesc;
}

function equiparItem(indexInventario){
let item = jogador.inventario[indexInventario];
if(!item) return;

let slot;
if(item.tipo === "arma") slot = 0;
else if(item.tipo === "armadura") slot = 1;
else slot = 2; // acessório

if(jogador.equipamento[slot]){
jogador.inventario.push(jogador.equipamento[slot]);
}
jogador.equipamento[slot] = item;
jogador.inventario.splice(indexInventario, 1);
criarMensagem(`${item.nome} equipado!`, coresRaridade[item.raridade]);
}

function getArmaEquipada(){
return jogador.equipamento[0];
}

function getCorArma(){
let arma = getArmaEquipada();
if(arma) return coresRaridade[arma.raridade];
return "#ffffff";
}

function getTamanhoSlash(){
let arma = getArmaEquipada();
if(arma) {
    if(arma.raridade === "comum") return 1.0;
    if(arma.raridade === "raro") return 1.2;
    if(arma.raridade === "epico") return 1.4;
    if(arma.raridade === "lendario") return 1.7;
    if(arma.raridade === "mitico") return 2.0;
}
return 1.0;
}

// ================= DESENHAR =================
function desenhar(){
ctx.save();

if(estado === "dungeon"){
let tremerX = (Math.random()-0.5)*tremorTela;
let tremerY = (Math.random()-0.5)*tremorTela;
ctx.translate(-camera.x + tremerX, -camera.y + tremerY);
} else {
ctx.translate(0, 0);
}

if(estado==="lobby"){
desenharLobby();
}
if(estado==="dungeon"){
desenharMasmorra();
}

ctx.restore();
desenharUI();
}

function desenharLobby(){
ctx.fillStyle = "#0f1222";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.font = "bold 48px 'Segoe UI'";
ctx.fillStyle = "#fff";
ctx.shadowColor = "#4a9eff";
ctx.shadowBlur = 20;
ctx.fillText("⚔️ RPG AVANÇADO ⚔️", 250, 80);
ctx.shadowBlur = 0;

// Abas do lobby
let abas = ["Personagem", "Inventário", "Skill Tree", "Quests"];

// Botões de aba
for(let i=0; i<4; i++){
    let x = 100 + i*150;
    let sobre = mouse.x > x && mouse.x < x+140 && mouse.y > 100 && mouse.y < 140;
    ctx.fillStyle = sobre ? "#4a9eff" : "#2a2f3f";
    ctx.fillRect(x, 100, 140, 40);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Arial";

masmorras.forEach((m,i)=>{
let x = 380 + (i%2)*320;
let y = 220 + Math.floor(i/2)*100;
let sobre = mouse.x>x && mouse.x<x+300 && mouse.y>y && mouse.y<y+80;

ctx.fillText(m.descricao.substring(0,25)+"...", x+20, y+60);

if(mouse.clicado && sobre){
iniciarMasmorra(m);
}
});

if(mouse.clicado) mouse.clicado=false;
}

        let btnX = x + 500;
        let btnSobre = mouse.x > btnX && mouse.x < btnX+80 && mouse.y > y && mouse.y < y+40;
        ctx.fillStyle = btnSobre ? "#4a9eff" : "#4aff4a";
        ctx.fillRect(btnX, y+10, 80, 30);
        ctx.fillStyle = "#000";
        ctx.font = "bold 14px Arial";
        ctx.fillText("COMPRAR", btnX+5, y+32);
        
        if(mouse.clicado && btnSobre){
            comprarSkill(abaSkillSelecionada, skillInfo.skill);
        }
    }
});
}

function desenharQuests(){
ctx.fillStyle = "#2a2f3f";
ctx.fillRect(40,150,1000,400);

ctx.fillStyle = "#fff";
ctx.font = "bold 28px Arial";
ctx.fillText("QUESTS ATIVAS", 400, 200);

questsAtivas.forEach((q, index) => {
    let y = 250 + index * 90;
    
    ctx.fillStyle = q.completada ? "#2a4a2a" : "#1a1f2a";
    ctx.fillRect(100, y, 800, 70);
    
    ctx.fillStyle = q.completada ? "#aaffaa" : "#fff";
    ctx.font = "bold 18px Arial";
    ctx.fillText(q.nome, 120, y+25);
    ctx.font = "14px Arial";
    ctx.fillText(q.desc, 120, y+45);
    
    // Barra de progresso
    ctx.fillStyle = "#333";
    ctx.fillRect(500, y+20, 200, 20);
    ctx.fillStyle = q.completada ? "#4aff4a" : "#ffaa00";
    let progresso = (q.progresso / q.objetivo) * 200;
    ctx.fillRect(500, y+20, Math.min(progresso, 200), 20);
    
    ctx.fillStyle = "#fff";
    ctx.fillText(`${q.progresso}/${q.objetivo}`, 710, y+38);
    
    if(q.completada){
        ctx.fillStyle = "#ffd700";
        ctx.font = "bold 16px Arial";
        ctx.fillText("COMPLETA!", 800, y+38);
    }
});
}

function desenharMasmorra(){
if(!masmorraSelecionada) return;

ctx.fillStyle = masmorraSelecionada.corFundo;
ctx.fillRect(-100,-100,canvas.width*2,canvas.height*2);

ctx.strokeStyle = masmorraSelecionada.cor + "33";
ctx.lineWidth = 1;
for(let i=-200;i<canvas.width+200;i+=70){
ctx.beginPath();
ctx.moveTo(i,-100);
ctx.lineTo(i,canvas.height+100);
ctx.strokeStyle = masmorraSelecionada.cor + "22";
ctx.stroke();
}
for(let i=-200;i<canvas.height+200;i+=70){
ctx.beginPath();
ctx.moveTo(-100,i);
ctx.lineTo(canvas.width+100,i);
ctx.stroke();
}

slashes.forEach(s => {
    let alpha = s.vida / s.vidaMax;
    let progresso = 1 - alpha; // 0 → 1

    ctx.save();
    ctx.translate(s.x, s.y);

    // Rotação dinâmica (faz o corte "varrer")
    ctx.rotate(s.direcao + (progresso - 0.5) * 1.2);

    ctx.globalAlpha = alpha * 0.9;

    // 🔥 Glow
    ctx.shadowBlur = 25;
    ctx.shadowColor = s.cor;

    let raioInterno = 30 * (1 + progresso * 0.2);
    let raioExterno = 70 * (1 + progresso * 0.2);
    let abertura = Math.PI / 2.2;

    // 🔥 Gradiente estilo metroidvania
    let grad = ctx.createRadialGradient(0, 0, raioInterno, 0, 0, raioExterno);
    grad.addColorStop(0, "white");
    grad.addColorStop(0.4, s.cor);
    grad.addColorStop(1, "transparent");

    ctx.fillStyle = grad;

    ctx.beginPath();

    // Arco externo
    ctx.arc(0, 0, raioExterno, -abertura / 2, abertura / 2);

    // Arco interno (volta)
    ctx.arc(0, 0, raioInterno, abertura / 2, -abertura / 2, true);

    ctx.closePath();
    ctx.fill();

    ctx.restore();
});

projetesis.forEach(p=>{
ctx.fillStyle = p.cor;
ctx.shadowBlur = 15;
ctx.shadowColor = p.cor;
ctx.beginPath();
ctx.arc(p.x, p.y, p.tamanho, 0, Math.PI*2);
ctx.fill();
});

inimigos.forEach(i=>{
ctx.fillStyle = i.cor;
ctx.shadowBlur = 25;
ctx.shadowColor = i.cor;
ctx.beginPath();
ctx.arc(i.x, i.y, 18 + Math.sin(i.animacao)*2, 0, Math.PI*2);
ctx.fill();

ctx.shadowBlur = 0;
ctx.fillStyle = "#000";
ctx.fillRect(i.x-25, i.y-35, 50, 5);
ctx.fillStyle = "#f00";
ctx.fillRect(i.x-25, i.y-35, 50 * (i.hp/i.hpMax), 5);
});

if(chefe){
ctx.fillStyle = chefe.cor;
ctx.shadowBlur = 50;
ctx.shadowColor = chefe.enfurecido?"#f00":"#a0f";
ctx.beginPath();
ctx.arc(chefe.x, chefe.y, 45 + Math.sin(tempoJogo*0.1)*5, 0, Math.PI*2);
ctx.fill();

ctx.shadowBlur = 0;
ctx.font = "bold 24px Arial";
ctx.fillStyle = "#fff";
ctx.fillText(chefe.nome, chefe.x-100, chefe.y-80);
ctx.fillStyle = "#000";
ctx.fillRect(chefe.x-120, chefe.y-60, 240, 20);
ctx.fillStyle = "#f00";
ctx.fillRect(chefe.x-120, chefe.y-60, 240 * (chefe.hp/chefe.hpMax), 20);

if(tempoJogo % 180 === 0 && chefe.fala){
criarMensagem(chefe.fala[0], chefe.cor);
}
}

ctx.shadowBlur = 40;
ctx.shadowColor = jogador.iframe>0 ? "#f00" : getCorArma();
ctx.fillStyle = jogador.iframe>0 ? "#ff8888" : "#44aaff";

ctx.beginPath();
ctx.arc(jogador.x, jogador.y, 22 + Math.sin(jogador.animacao)*2, 0, Math.PI*2);
ctx.fill();

let arma = getArmaEquipada();
if(arma){
ctx.beginPath();
ctx.moveTo(jogador.x, jogador.y);
ctx.lineTo(jogador.x + Math.cos(jogador.direcao)*45, jogador.y + Math.sin(jogador.direcao)*45);
ctx.strokeStyle = coresRaridade[arma.raridade];
ctx.lineWidth = 6;
ctx.shadowBlur = 20;
ctx.stroke();
}

particulas.forEach(p=>{
ctx.globalAlpha = p.vida/p.vidaMax;
ctx.fillStyle = p.cor;
ctx.beginPath();
ctx.arc(p.x, p.y, p.tamanho * (p.vida/p.vidaMax), 0, Math.PI*2);
ctx.fill();
});

numerosFlutuantes.forEach(n=>{
ctx.globalAlpha = n.vida/60;
ctx.font = `bold ${n.tamanho}px Arial`;
ctx.fillStyle = n.cor;
ctx.fillText(n.texto, n.x, n.y);
});
ctx.globalAlpha = 1;
ctx.shadowBlur = 0;
}

function desenharUI(){
ctx.save();
ctx.setTransform(1,0,0,1,0,0);

ctx.fillStyle = "#333";
ctx.fillRect(20,20,300,30);
ctx.fillStyle = "#f00";
ctx.fillRect(20,20,300 * (jogador.hp/jogador.maxHp),30);
ctx.fillStyle = "#fff";
ctx.font = "bold 18px Arial";
ctx.fillText(`❤️ ${Math.floor(jogador.hp)}/${jogador.maxHp}`, 140, 45);

ctx.fillStyle = "#333";
ctx.fillRect(330,20,120,30);
ctx.fillStyle = "#0f0";
ctx.fillRect(330,20,120 * (jogador.pocaoCooldown?0:jogador.pocoes/5),30);
ctx.fillText(`🧪 x${jogador.pocoes}`, 360, 45);

ctx.fillStyle = "#333";
ctx.fillRect(20,60,300,15);
ctx.fillStyle = "#ffd700";
ctx.fillRect(20,60,300 * (jogador.xp/(jogador.nivel*100)),15);

ctx.fillStyle = "#fff";
ctx.font = "16px Arial";
ctx.fillText(`Nível ${jogador.nivel}`, 330, 75);
ctx.fillText(`🪙 ${jogador.ouro}`, 440, 75);

let arma = getArmaEquipada();
if(arma){
ctx.fillStyle = coresRaridade[arma.raridade];
ctx.fillRect(470,20,250,40);
ctx.fillStyle = "#fff";
ctx.font = "bold 14px Arial";
ctx.fillText(`${arma.nome} +${arma.poder}`, 480, 45);
if(arma.efeito){
    ctx.fillStyle = arma.efeito.cor;
    ctx.beginPath();
    ctx.arc(700, 40, 8, 0, Math.PI*2);
    ctx.fill();
}
}

if(mensagemTemporaria.tempo > 0){
ctx.globalAlpha = mensagemTemporaria.tempo/120;
ctx.font = "bold 36px Arial";
ctx.fillStyle = mensagemTemporaria.cor;
ctx.shadowBlur = 20;
ctx.shadowColor = mensagemTemporaria.cor;
ctx.fillText(mensagemTemporaria.texto, canvas.width/2-150, canvas.height/2-50);
ctx.shadowBlur = 0;
ctx.globalAlpha = 1;
}

if(estado==="dungeon" && masmorraSelecionada){
ctx.fillStyle = masmorraSelecionada.cor;
ctx.fillRect(20,100,200,50);
ctx.fillStyle = "#fff";
ctx.font = "bold 16px Arial";
ctx.fillText(masmorraSelecionada.nome, 30, 135);
ctx.fillText(`👥 ${inimigos.length}`, 30, 165);
if(chefe) ctx.fillText("BOSS ATIVO!", 30, 195);
}

ctx.fillStyle = "rgba(0,0,0,0.5)";
ctx.fillRect(canvas.width-220, canvas.height-120, 200, 100);
ctx.fillStyle = "#fff";
ctx.font = "12px Arial";
ctx.fillText("ESPAÇO: Atacar", canvas.width-210, canvas.height-90);
ctx.fillText("Q: Poção", canvas.width-210, canvas.height-75);
ctx.fillText("SHIFT: Dash", canvas.width-210, canvas.height-60);
ctx.fillText("1-4: Slots", canvas.width-210, canvas.height-45);
ctx.fillText("Pontos Skill: " + pontosSkill, canvas.width-210, canvas.height-30);

ctx.restore();
}

// ================= LOOP =================
function loop(){
atualizar();
desenhar();
requestAnimationFrame(loop);
}
loop();
</script>
