<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG Avançado - Versão Estável</title>
<style>
body { 
margin:0; 
overflow:hidden; 
background:#111; 
font-family:'Segoe UI', Arial, sans-serif; 
}
canvas { 
display:block; 
margin:auto; 
background: #1a1f2a;
box-shadow: 0 0 30px rgba(0,0,0,0.8);
cursor: crosshair;
}
</style>
</head>
<body>
<canvas id="game" width="1100" height="650"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ================= ESTADO DO JOGO =================
let estado = "lobby";
let teclas = {};
let mouse = {x: 0, y: 0, clicado: false};
let particulas = [];
let numerosFlutuantes = [];
let projetesis = [];
let slashes = [];
let inimigos = [];
let chefe = null;
let masmorraSelecionada = null;
let mensagem = "";
let tempoMensagem = 0;
let skillPoints = 3;
let abaInventario = "todos";

// ================= JOGADOR =================
let jogador = {
    x: 550,
    y: 500,
    hp: 100,
    maxHp: 100,
    xp: 0,
    nivel: 1,
    ouro: 100,
    velocidade: 5,
    danoBase: 15,
    defesaBase: 3,
    iframe: 0,
    slashCooldown: 0,
    direcao: 0,
    animacao: 0,
    pocoes: 3,
    pocaoCooldown: 0,
    inventario: [],
    equipamento: [null, null, null, null],
    forca: 5,
    agilidade: 5,
    constituicao: 5,
    habilidades: {
        dash: false,
        dashCooldown: 0
    },
    estatisticas: {
        inimigosMortos: 0,
        chefesDerrotados: 0
    }
};

// ================= MASMORRAS =================
let masmorras = [
    { nome: "🌿 Caverna Verde", dificuldade: 1, cor: "#4caf50", corFundo: "#1a3a1a", inimigos: 4 },
    { nome: "🌑 Templo Sombrio", dificuldade: 2, cor: "#9c27b0", corFundo: "#1a1a2a", inimigos: 6 },
    { nome: "🔥 Abismo Infernal", dificuldade: 3, cor: "#f44336", corFundo: "#3a1a1a", inimigos: 8 },
    { nome: "❄️ Pico Gelado", dificuldade: 4, cor: "#00bcd4", corFundo: "#1a3a4a", inimigos: 10 },
    { nome: "⚡ Torre da Tempestade", dificuldade: 5, cor: "#ffc107", corFundo: "#2a1a3a", inimigos: 12 }
];

// ================= RARIDADES =================
let raridades = {
    comum: { cor: "#a0a0a0", mult: 1 },
    raro: { cor: "#4a9eff", mult: 1.5 },
    epico: { cor: "#b87cff", mult: 2 },
    lendario: { cor: "#ffaa33", mult: 3 },
    mitico: { cor: "#ff5555", mult: 5 }
};

// ================= EFEITOS =================
let efeitosEspeciais = [
    { nome: "Flamante", cor: "#ff5500", bonus: 5, tipo: "dano" },
    { nome: "Gélido", cor: "#00ccff", bonus: 3, tipo: "defesa" },
    { nome: "Vampírico", cor: "#aa0000", bonus: 10, tipo: "vida" }
];

// ================= SKILL TREE =================
let skillTree = {
    forca: { nivel: 0, max: 5, custo: 1, desc: "+2 de dano" },
    agilidade: { nivel: 0, max: 5, custo: 1, desc: "+2% crítico" },
    constituicao: { nivel: 0, max: 5, custo: 1, desc: "+5 HP" },
    velocidade: { nivel: 0, max: 5, custo: 1, desc: "+0.5 velocidade" }
};

// ================= QUESTS =================
let quests = [
    { nome: "Matador de Inimigos", desc: "Mate 5 inimigos", progresso: 0, meta: 5, completa: false, recompensa: "dash" }
];

// ================= EVENTOS =================
window.addEventListener("keydown", (e) => teclas[e.key] = true);
window.addEventListener("keyup", (e) => teclas[e.key] = false);

canvas.addEventListener("mousemove", (e) => {
    let rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

canvas.addEventListener("mousedown", () => mouse.clicado = true);
canvas.addEventListener("mouseup", () => mouse.clicado = false);
canvas.addEventListener("contextmenu", (e) => e.preventDefault());

// ================= FUNÇÕES =================
function aleatorio(min, max) {
    return Math.random() * (max - min) + min;
}

function aleatorioInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function distancia(x1, y1, x2, y2) {
    return Math.hypot(x1 - x2, y1 - y2);
}

function criarMensagem(texto, cor = "#ffffff") {
    mensagem = texto;
    tempoMensagem = 90;
}

function criarParticula(x, y, cor, tamanho = 3, qtd = 3) {
    for (let i = 0; i < qtd; i++) {
        particulas.push({
            x: x + aleatorio(-10, 10),
            y: y + aleatorio(-10, 10),
            cor: cor,
            tamanho: tamanho * aleatorio(0.5, 1.5),
            vx: aleatorio(-2, 2),
            vy: aleatorio(-2, 2),
            vida: 20 + aleatorioInt(0, 10)
        });
    }
}

function criarNumero(x, y, texto, cor = "#ffffff") {
    numerosFlutuantes.push({
        x: x,
        y: y,
        texto: texto,
        cor: cor,
        vx: aleatorio(-0.5, 0.5),
        vy: -1.5,
        vida: 40
    });
}

function criarSlash(x, y, direcao, cor, tamanho = 1) {
    slashes.push({
        x: x + Math.cos(direcao) * 30,
        y: y + Math.sin(direcao) * 30,
        direcao: direcao,
        comprimento: 60 * tamanho,
        largura: 30 * tamanho,
        cor: cor,
        vida: 8
    });
}

function getDanoJogador() {
    let dano = jogador.danoBase + (jogador.nivel * 2) + (jogador.forca * 2) + (skillTree.forca.nivel * 2);
    let arma = jogador.equipamento[0];
    if (arma) dano += arma.poder;
    if (arma && arma.danoBonus) dano += arma.danoBonus;
    return Math.floor(dano);
}

function getDefesaJogador() {
    let defesa = jogador.defesaBase + (jogador.constituicao * 1) + (skillTree.constituicao.nivel * 2);
    let armadura = jogador.equipamento[1];
    if (armadura) defesa += armadura.poder;
    if (armadura && armadura.defBonus) defesa += armadura.defBonus;
    return defesa;
}

function getVelocidade() {
    return jogador.velocidade + (skillTree.velocidade.nivel * 0.5);
}

function atacar() {
    if (jogador.slashCooldown > 0) return;
    jogador.slashCooldown = 12;

    let dano = getDanoJogador();
    let arma = jogador.equipamento[0];
    let corArma = arma ? (arma.corEfeito || raridades[arma.raridade].cor) : "#ffffff";
    let tamanho = arma ? (raridades[arma.raridade].mult || 1) : 1;

    criarSlash(jogador.x, jogador.y, jogador.direcao, corArma, tamanho);

    // Acertar inimigos
    inimigos.forEach(i => {
        if (distancia(jogador.x, jogador.y, i.x, i.y) < 90) {
            i.hp -= dano;
            criarNumero(i.x, i.y - 20, `-${dano}`, corArma);
            criarParticula(i.x, i.y, corArma, 5, 5);
            
            // Knockback
            let ang = Math.atan2(i.y - jogador.y, i.x - jogador.x);
            i.x += Math.cos(ang) * 20;
            i.y += Math.sin(ang) * 20;
        }
    });

    // Acertar chefe
    if (chefe && distancia(jogador.x, jogador.y, chefe.x, chefe.y) < 120) {
        chefe.hp -= dano;
        criarNumero(chefe.x, chefe.y - 30, `-${dano}`, corArma);
        criarParticula(chefe.x, chefe.y, corArma, 8, 8);
    }
}

function usarPocao() {
    if (jogador.pocoes <= 0 || jogador.pocaoCooldown > 0) return;
    jogador.pocoes--;
    jogador.hp = Math.min(jogador.maxHp, jogador.hp + 50);
    jogador.pocaoCooldown = 90;
    criarMensagem("Poção usada! +50 HP", "#4caf50");
    criarParticula(jogador.x, jogador.y, "#4caf50", 10, 10);
}

function usarDash() {
    if (!jogador.habilidades.dash || jogador.habilidades.dashCooldown > 0) return;
    
    let dx = Math.cos(jogador.direcao) * 150;
    let dy = Math.sin(jogador.direcao) * 150;
    jogador.x += dx;
    jogador.y += dy;
    jogador.habilidades.dashCooldown = 120;
    criarMensagem("Dash!", "#00ffff");
    criarParticula(jogador.x, jogador.y, "#00ffff", 8, 15);
}

function iniciarMasmorra(m) {
    masmorraSelecionada = m;
    estado = "dungeon";
    inimigos = [];
    chefe = null;
    
    jogador.x = canvas.width / 2;
    jogador.y = canvas.height / 2;
    
    for (let i = 0; i < m.inimigos; i++) {
        let tipo = Math.random() > 0.6 ? "ranged" : "melee";
        inimigos.push({
            x: aleatorio(200, 900),
            y: aleatorio(150, 500),
            hp: 30 + (m.dificuldade * 15),
            maxHp: 30 + (m.dificuldade * 15),
            dano: 5 + (m.dificuldade * 2),
            tipo: tipo,
            cor: m.cor,
            xp: 10 * m.dificuldade
        });
    }
    
    criarMensagem(`Entrou em ${m.nome}`, m.cor);
}

function criarChefe() {
    if (!masmorraSelecionada) return;
    
    chefe = {
        nome: "Guardião " + masmorraSelecionada.nome,
        x: aleatorio(400, 700),
        y: 200,
        hp: 200 * masmorraSelecionada.dificuldade,
        maxHp: 200 * masmorraSelecionada.dificuldade,
        dano: 12 * masmorraSelecionada.dificuldade,
        cor: masmorraSelecionada.cor
    };
    
    criarMensagem("⚔️ CHEFE APARECEU! ⚔️", "#ff5500");
    criarParticula(chefe.x, chefe.y, "#ff5500", 15, 15);
}

function gerarItem() {
    let raridadesLista = ["comum", "raro", "epico", "lendario"];
    let raridade = raridadesLista[Math.floor(Math.random() * raridadesLista.length)];
    let tipo = Math.random() > 0.5 ? "arma" : "armadura";
    
    let item = {
        tipo: tipo,
        poder: Math.floor(aleatorioInt(5, 15) * raridades[raridade].mult),
        raridade: raridade,
        nome: (tipo === "arma" ? "Espada " : "Armadura ") + raridade
    };
    
    if (Math.random() < 0.3) {
        let efeito = efeitosEspeciais[Math.floor(Math.random() * efeitosEspeciais.length)];
        item.efeito = efeito.nome;
        item.corEfeito = efeito.cor;
        item.danoBonus = efeito.tipo === "dano" ? efeito.bonus : 0;
        item.defBonus = efeito.tipo === "defesa" ? efeito.bonus : 0;
        item.nome = efeito.nome + " " + item.nome;
    }
    
    return item;
}

function equiparItem(index) {
    let item = jogador.inventario[index];
    if (!item) return;
    
    let slot = item.tipo === "arma" ? 0 : 1;
    
    if (jogador.equipamento[slot]) {
        jogador.inventario.push(jogador.equipamento[slot]);
    }
    
    jogador.equipamento[slot] = item;
    jogador.inventario.splice(index, 1);
    criarMensagem(`${item.nome} equipado!`, item.corEfeito || raridades[item.raridade].cor);
}

function comprarSkill(skill) {
    if (skillPoints <= 0) return;
    let s = skillTree[skill];
    if (s.nivel < s.max) {
        s.nivel++;
        skillPoints--;
        criarMensagem(`${skill} +1`, "#4caf50");
    }
}

// ================= UPDATE =================
function update() {
    if (estado === "dungeon") {
        // Movimento
        let dx = 0, dy = 0;
        if (teclas["w"] || teclas["ArrowUp"]) dy--;
        if (teclas["s"] || teclas["ArrowDown"]) dy++;
        if (teclas["a"] || teclas["ArrowLeft"]) dx--;
        if (teclas["d"] || teclas["ArrowRight"]) dx++;
        
        if (dx !== 0 || dy !== 0) {
            let len = Math.hypot(dx, dy);
            dx /= len;
            dy /= len;
            jogador.x += dx * getVelocidade();
            jogador.y += dy * getVelocidade();
            jogador.direcao = Math.atan2(dy, dx);
            jogador.animacao += 0.1;
        }
        
        jogador.x = Math.max(50, Math.min(1050, jogador.x));
        jogador.y = Math.max(50, Math.min(600, jogador.y));
        
        // Ações
        if (teclas[" "]) atacar();
        if (teclas["q"]) usarPocao();
        if (teclas["Shift"]) usarDash();
        
        // Cooldowns
        if (jogador.slashCooldown > 0) jogador.slashCooldown--;
        if (jogador.pocaoCooldown > 0) jogador.pocaoCooldown--;
        if (jogador.habilidades.dashCooldown > 0) jogador.habilidades.dashCooldown--;
        
        // Atualizar inimigos
        inimigos = inimigos.filter(i => {
            if (i.hp <= 0) {
                jogador.xp += i.xp;
                jogador.ouro += aleatorioInt(5, 10);
                jogador.estatisticas.inimigosMortos++;
                quests[0].progresso++;
                criarParticula(i.x, i.y, i.cor, 8, 10);
                return false;
            }
            
            let ang = Math.atan2(jogador.y - i.y, jogador.x - i.x);
            i.x += Math.cos(ang) * 1.5;
            i.y += Math.sin(ang) * 1.5;
            
            if (distancia(jogador.x, jogador.y, i.x, i.y) < 30 && jogador.iframe === 0) {
                let dano = Math.max(1, i.dano - getDefesaJogador() / 3);
                jogador.hp -= dano;
                jogador.iframe = 25;
                criarNumero(jogador.x, jogador.y - 20, `-${dano}`, "#ff0000");
                criarParticula(jogador.x, jogador.y, "#ff0000", 6, 8);
            }
            
            return true;
        });
        
        // Chefe
        if (chefe) {
            if (chefe.hp <= 0) {
                jogador.xp += 100 * masmorraSelecionada.dificuldade;
                jogador.ouro += 100 * masmorraSelecionada.dificuldade;
                jogador.estatisticas.chefesDerrotados++;
                criarMensagem("CHEFE DERROTADO! 🏆", "#ffd700");
                criarParticula(chefe.x, chefe.y, "#ffd700", 15, 20);
                
                for (let i = 0; i < 2; i++) {
                    jogador.inventario.push(gerarItem());
                }
                
                chefe = null;
                estado = "lobby";
            }
            
            let ang = Math.atan2(jogador.y - chefe.y, jogador.x - chefe.x);
            chefe.x += Math.cos(ang) * 1;
            chefe.y += Math.sin(ang) * 1;
            
            if (distancia(jogador.x, jogador.y, chefe.x, chefe.y) < 50 && jogador.iframe === 0) {
                let dano = Math.max(1, chefe.dano - getDefesaJogador() / 3);
                jogador.hp -= dano;
                jogador.iframe = 25;
                criarNumero(jogador.x, jogador.y - 20, `-${dano}`, "#ff0000");
            }
        }
        
        if (inimigos.length === 0 && !chefe) {
            criarChefe();
        }
        
        if (jogador.hp <= 0) {
            jogador.hp = jogador.maxHp;
            estado = "lobby";
            criarMensagem("Você morreu...", "#ff0000");
        }
    }
    
    // Quest
    if (quests[0].progresso >= quests[0].meta && !quests[0].completa) {
        quests[0].completa = true;
        jogador.habilidades.dash = true;
        criarMensagem("DASH DESBLOQUEADO!", "#00ffff");
    }
    
    // Level up
    if (jogador.xp >= jogador.nivel * 100) {
        jogador.nivel++;
        jogador.xp = 0;
        jogador.maxHp += 20;
        jogador.hp = jogador.maxHp;
        skillPoints += 2;
        criarMensagem("LEVEL UP! +2 Skill Points", "#ffd700");
    }
    
    // Iframe
    if (jogador.iframe > 0) jogador.iframe--;
    
    // Atualizar partículas
    particulas = particulas.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vida--;
        return p.vida > 0;
    });
    
    // Atualizar slashes
    slashes = slashes.filter(s => {
        s.vida--;
        return s.vida > 0;
    });
    
    // Atualizar números
    numerosFlutuantes = numerosFlutuantes.filter(n => {
        n.x += n.vx;
        n.y += n.vy;
        n.vida--;
        return n.vida > 0;
    });
    
    if (tempoMensagem > 0) tempoMensagem--;
    if (mouse.clicado) mouse.clicado = false;
}

// ================= DRAW =================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (estado === "lobby") {
        drawLobby();
    } else {
        drawDungeon();
    }
    
    drawUI();
}

function drawLobby() {
    // Fundo
    ctx.fillStyle = "#1a1f2a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Título
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 40px Arial";
    ctx.fillText("⚔️ RPG DAS MASMORRAS ⚔️", 250, 60);
    
    // Card do jogador
    ctx.fillStyle = "#2a2f3f";
    ctx.fillRect(30, 80, 300, 280);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 20px Arial";
    ctx.fillText("JOGADOR", 140, 110);
    ctx.font = "16px Arial";
    ctx.fillText(`❤️ HP: ${jogador.hp}/${jogador.maxHp}`, 50, 150);
    ctx.fillText(`📊 Nível: ${jogador.nivel}`, 50, 180);
    ctx.fillText(`✨ XP: ${jogador.xp}/${jogador.nivel * 100}`, 50, 210);
    ctx.fillText(`🪙 Ouro: ${jogador.ouro}`, 50, 240);
    ctx.fillText(`⚔️ Dano: ${getDanoJogador()}`, 50, 270);
    ctx.fillText(`🛡️ Defesa: ${getDefesaJogador()}`, 50, 300);
    ctx.fillText(`🏆 Inimigos: ${jogador.estatisticas.inimigosMortos}`, 50, 330);
    
    // Slots de equipamento
    ctx.fillStyle = "#2a2f3f";
    ctx.fillRect(30, 370, 300, 80);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 14px Arial";
    ctx.fillText("EQUIPAMENTOS", 140, 365);
    
    for (let i = 0; i < 4; i++) {
        let x = 40 + i * 75;
        ctx.fillStyle = "#333";
        ctx.fillRect(x, 380, 60, 60);
        if (jogador.equipamento[i]) {
            let item = jogador.equipamento[i];
            ctx.fillStyle = item.corEfeito || raridades[item.raridade].cor;
            ctx.fillRect(x, 380, 60, 60);
            ctx.fillStyle = "#ffffff";
            ctx.font = "10px Arial";
            ctx.fillText(item.nome.substring(0, 6), x + 5, 450);
        }
    }
    
    // Skill Tree
    ctx.fillStyle = "#2a2f3f";
    ctx.fillRect(350, 80, 300, 280);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 20px Arial";
    ctx.fillText("SKILL TREE", 420, 110);
    ctx.font = "16px Arial";
    ctx.fillText(`Pontos: ${skillPoints}`, 420, 140);
    
    let y = 170;
    for (let [nome, skill] of Object.entries(skillTree)) {
        ctx.fillStyle = "#333";
        ctx.fillRect(360, y, 280, 30);
        ctx.fillStyle = "#4caf50";
        ctx.fillRect(360, y, 280 * (skill.nivel / skill.max), 30);
        ctx.fillStyle = "#ffffff";
        ctx.fillText(`${nome}: ${skill.nivel}/${skill.max}`, 370, y + 22);
        
        if (skillPoints > 0 && skill.nivel < skill.max) {
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(610, y, 30, 30);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 20px Arial";
            ctx.fillText("+", 618, y + 24);
            
            if (mouse.clicado && mouse.x > 610 && mouse.x < 640 && mouse.y > y && mouse.y < y + 30) {
                comprarSkill(nome);
            }
        }
        
        y += 40;
    }
    
    // Quest
    ctx.fillStyle = "#2a2f3f";
    ctx.fillRect(350, 370, 300, 80);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 16px Arial";
    ctx.fillText("QUEST", 460, 395);
    ctx.font = "14px Arial";
    ctx.fillText(`${quests[0].nome}: ${quests[0].progresso}/${quests[0].meta}`, 370, 425);
    if (quests[0].completa) {
        ctx.fillStyle = "#4caf50";
        ctx.fillText("COMPLETA!", 370, 445);
    }
    
    // Dash status
    ctx.fillStyle = jogador.habilidades.dash ? "#00ffff" : "#666";
    ctx.font = "bold 14px Arial";
    ctx.fillText(`DASH: ${jogador.habilidades.dash ? "✓" : "✗"}`, 370, 470);
    
    // Masmorras
    ctx.fillStyle = "#2a2f3f";
    ctx.fillRect(670, 80, 400, 370);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 20px Arial";
    ctx.fillText("MASMORRAS", 800, 110);
    
    masmorras.forEach((m, i) => {
        let y = 140 + i * 65;
        let sobre = mouse.x > 680 && mouse.x < 1060 && mouse.y > y && mouse.y < y + 50;
        
        ctx.fillStyle = sobre ? m.cor : "#333";
        ctx.fillRect(680, y, 380, 50);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 16px Arial";
        ctx.fillText(m.nome, 700, y + 25);
        ctx.font = "12px Arial";
        ctx.fillText(`Dificuldade: ${m.dificuldade}`, 700, y + 42);
        
        if (mouse.clicado && sobre) {
            iniciarMasmorra(m);
        }
    });
    
    // Inventário
    ctx.fillStyle = "#2a2f3f";
    ctx.fillRect(670, 460, 400, 160);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 16px Arial";
    ctx.fillText("INVENTÁRIO", 830, 485);
    
    jogador.inventario.slice(0, 8).forEach((item, i) => {
        let x = 680 + (i % 5) * 75;
        let y = 500 + Math.floor(i / 5) * 70;
        
        ctx.fillStyle = item.corEfeito || raridades[item.raridade].cor;
        ctx.fillRect(x, y, 60, 60);
        ctx.fillStyle = "#ffffff";
        ctx.font = "8px Arial";
        ctx.fillText(item.nome.substring(0, 8), x + 5, y + 70);
        ctx.fillText(`+${item.poder}`, x + 5, y + 80);
        
        if (mouse.clicado && mouse.x > x && mouse.x < x + 60 && mouse.y > y && mouse.y < y + 60) {
            equiparItem(jogador.inventario.indexOf(item));
        }
    });
}

function drawDungeon() {
    // Fundo da dungeon
    ctx.fillStyle = masmorraSelecionada ? masmorraSelecionada.corFundo : "#1a1f2a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grid
    ctx.strokeStyle = "#334455";
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += 60) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.strokeStyle = "#33445533";
        ctx.stroke();
    }
    for (let i = 0; i < canvas.height; i += 60) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
    }
    
    // Slashes
    slashes.forEach(s => {
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(s.direcao);
        ctx.globalAlpha = s.vida / 8;
        ctx.fillStyle = s.cor;
        ctx.shadowBlur = 20;
        ctx.shadowColor = s.cor;
        
        ctx.beginPath();
        ctx.moveTo(0, -s.largura/2);
        ctx.quadraticCurveTo(s.comprimento/2, -s.largura/2 - 10, s.comprimento, -s.largura/2);
        ctx.lineTo(s.comprimento, s.largura/2);
        ctx.quadraticCurveTo(s.comprimento/2, s.largura/2 + 10, 0, s.largura/2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    });
    
    // Inimigos
    inimigos.forEach(i => {
        ctx.fillStyle = i.cor;
        ctx.shadowBlur = 20;
        ctx.shadowColor = i.cor;
        ctx.beginPath();
        ctx.arc(i.x, i.y, 18, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#000";
        ctx.fillRect(i.x - 25, i.y - 35, 50, 5);
        ctx.fillStyle = "#f00";
        ctx.fillRect(i.x - 25, i.y - 35, 50 * (i.hp / i.maxHp), 5);
    });
    
    // Chefe
    if (chefe) {
        ctx.fillStyle = chefe.cor;
        ctx.shadowBlur = 30;
        ctx.shadowColor = chefe.cor;
        ctx.beginPath();
        ctx.arc(chefe.x, chefe.y, 40, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#000";
        ctx.fillRect(chefe.x - 100, chefe.y - 60, 200, 15);
        ctx.fillStyle = "#f00";
        ctx.fillRect(chefe.x - 100, chefe.y - 60, 200 * (chefe.hp / chefe.maxHp), 15);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Arial";
        ctx.fillText(chefe.nome, chefe.x - 70, chefe.y - 70);
    }
    
    // Jogador
    ctx.shadowBlur = 30;
    ctx.shadowColor = jogador.iframe > 0 ? "#ff0000" : "#00ffff";
    ctx.fillStyle = jogador.iframe > 0 ? "#ff8888" : "#44aaff";
    ctx.beginPath();
    ctx.arc(jogador.x, jogador.y, 22 + Math.sin(jogador.animacao) * 2, 0, Math.PI * 2);
    ctx.fill();
    
    // Arma
    let arma = jogador.equipamento[0];
    if (arma) {
        ctx.beginPath();
        ctx.moveTo(jogador.x, jogador.y);
        ctx.lineTo(jogador.x + Math.cos(jogador.direcao) * 45, jogador.y + Math.sin(jogador.direcao) * 45);
        ctx.strokeStyle = arma.corEfeito || raridades[arma.raridade].cor;
        ctx.lineWidth = 6;
        ctx.stroke();
    }
    
    // Partículas
    particulas.forEach(p => {
        ctx.globalAlpha = p.vida / 30;
        ctx.fillStyle = p.cor;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.tamanho, 0, Math.PI * 2);
        ctx.fill();
    });
    
    // Números flutuantes
    numerosFlutuantes.forEach(n => {
        ctx.globalAlpha = n.vida / 40;
        ctx.font = "bold 20px Arial";
        ctx.fillStyle = n.cor;
        ctx.fillText(n.texto, n.x, n.y);
    });
    
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
}

function drawUI() {
    // Barra de vida
    ctx.fillStyle = "#333";
    ctx.fillRect(20, 20, 300, 25);
    ctx.fillStyle = "#f00";
    ctx.fillRect(20, 20, 300 * (jogador.hp / jogador.maxHp), 25);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Arial";
    ctx.fillText(`❤️ ${Math.floor(jogador.hp)}/${jogador.maxHp}`, 140, 42);
    
    // Poções
    ctx.fillStyle = "#333";
    ctx.fillRect(330, 20, 80, 25);
    ctx.fillStyle = "#0f0";
    ctx.fillRect(330, 20, 80 * (jogador.pocoes / 3), 25);
    ctx.fillStyle = "#fff";
    ctx.fillText(`🧪 ${jogador.pocoes}`, 350, 42);
    
    // Dash
    if (jogador.habilidades.dash) {
        ctx.fillStyle = "#333";
        ctx.fillRect(420, 20, 80, 25);
        ctx.fillStyle = "#00ffff";
        ctx.fillRect(420, 20, 80 * (1 - jogador.habilidades.dashCooldown / 120), 25);
        ctx.fillStyle = "#fff";
        ctx.fillText("DASH", 440, 42);
    }
    
    // XP
    ctx.fillStyle = "#333";
    ctx.fillRect(20, 55, 300, 10);
    ctx.fillStyle = "#ffd700";
    ctx.fillRect(20, 55, 300 * (jogador.xp / (jogador.nivel * 100)), 10);
    
    // Mensagem
    if (tempoMensagem > 0) {
        ctx.globalAlpha = tempoMensagem / 90;
        ctx.font = "bold 30px Arial";
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#00ffff";
        ctx.fillText(mensagem, canvas.width / 2 - 150, canvas.height / 2 - 50);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }
    
    // Inimigos restantes
    if (estado === "dungeon") {
        ctx.fillStyle = "#333";
        ctx.fillRect(20, 80, 150, 25);
        ctx.fillStyle = "#fff";
        ctx.fillText(`👥 Inimigos: ${inimigos.length}`, 30, 100);
    }
    
    // Controles
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(canvas.width - 200, canvas.height - 100, 180, 80);
    ctx.fillStyle = "#fff";
    ctx.font = "12px Arial";
    ctx.fillText("ESPAÇO: Atacar", canvas.width - 190, canvas.height - 70);
    ctx.fillText("Q: Poção", canvas.width - 190, canvas.height - 55);
    ctx.fillText("SHIFT: Dash", canvas.width - 190, canvas.height - 40);
    ctx.fillText("WASD: Mover", canvas.width - 190, canvas.height - 25);
}

// ================= LOOP =================
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
