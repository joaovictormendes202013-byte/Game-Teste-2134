<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RPG Web Evoluído</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; margin:auto; background:#1a1a1a; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 600;

const world = { width: 2500, height: 2500 };
const keys = {};

let inventoryOpen = false;

const player = {
    x: 300,
    y: 300,
    size: 40,
    speed: 4,
    hp: 100,
    maxHp: 100,
    xp: 0,
    level: 1,
    direction: "down",
    attackCooldown: 0,
    combo: 0,
    comboTimer: 0,
    specialCooldown: 0,
    gold: 0
};

let enemies = [];
let slashes = [];
let obstacles = [];

function saveGame() {
    localStorage.setItem("rpgSave", JSON.stringify(player));
}

function loadGame() {
    const save = localStorage.getItem("rpgSave");
    if (save) Object.assign(player, JSON.parse(save));
}

loadGame();

window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === "i") inventoryOpen = !inventoryOpen;
});
window.addEventListener("keyup", e => keys[e.key] = false);

function spawnEnemy() {
    enemies.push({
        x: Math.random() * world.width,
        y: Math.random() * world.height,
        size: 35,
        hp: 50,
        maxHp: 50,
        speed: 1.6
    });
}

for (let i = 0; i < 20; i++) spawnEnemy();

for (let i = 0; i < 30; i++) {
    obstacles.push({
        x: Math.random() * world.width,
        y: Math.random() * world.height,
        size: 60
    });
}

function attack() {
    if (player.attackCooldown > 0) return;

    player.attackCooldown = 20;
    player.combo++;
    player.comboTimer = 40;
    if (player.combo > 3) player.combo = 1;

    const damage = 10 + player.level * 3 + player.combo * 5;
    createSlash(70 + player.combo * 10, damage);
}

function special() {
    if (player.specialCooldown > 0) return;

    player.specialCooldown = 300;

    enemies.forEach(enemy => {
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 200) {
            enemy.hp -= 40 + player.level * 5;
        }
    });
}

function createSlash(range, damage) {
    let hitbox = { x: player.x, y: player.y, w: 60, h: 60 };

    if (player.direction === "up") hitbox.y -= range;
    if (player.direction === "down") hitbox.y += range;
    if (player.direction === "left") hitbox.x -= range;
    if (player.direction === "right") hitbox.x += range;

    slashes.push({ ...hitbox, life: 10 });

    enemies.forEach(enemy => {
        if (
            enemy.x < hitbox.x + hitbox.w &&
            enemy.x + enemy.size > hitbox.x &&
            enemy.y < hitbox.y + hitbox.h &&
            enemy.y + enemy.size > hitbox.y
        ) {
            enemy.hp -= damage;
        }
    });
}

function collideObstacle(x,y,size){
    for (let o of obstacles){
        if (x < o.x + o.size &&
            x + size > o.x &&
            y < o.y + o.size &&
            y + size > o.y){
                return true;
        }
    }
    return false;
}

function update() {

    let newX = player.x;
    let newY = player.y;

    if (keys["w"]) { newY -= player.speed; player.direction="up";}
    if (keys["s"]) { newY += player.speed; player.direction="down";}
    if (keys["a"]) { newX -= player.speed; player.direction="left";}
    if (keys["d"]) { newX += player.speed; player.direction="right";}

    if (!collideObstacle(newX,newY,player.size)){
        player.x = newX;
        player.y = newY;
    }

    if (keys[" "]) attack();
    if (keys["e"]) special();

    if (player.attackCooldown>0) player.attackCooldown--;
    if (player.specialCooldown>0) player.specialCooldown--;

    if (player.comboTimer>0) player.comboTimer--;
    else player.combo=0;

    enemies.forEach(enemy=>{
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (enemy.hp < 20){
            enemy.x -= dx/dist * enemy.speed;
            enemy.y -= dy/dist * enemy.speed;
        } else if (dist > 5){
            enemy.x += dx/dist * enemy.speed;
            enemy.y += dy/dist * enemy.speed;
        }

        if (dist < 30){
            player.hp -= 0.3;
        }
    });

    enemies = enemies.filter(enemy=>{
        if (enemy.hp<=0){
            player.xp+=30;
            player.gold+=10;
            spawnEnemy();
            return false;
        }
        return true;
    });

    const needed = player.level*80;
    if (player.xp>=needed){
        player.xp-=needed;
        player.level++;
        player.maxHp+=30;
        player.hp=player.maxHp;
    }

    if (player.hp<0) player.hp=0;

    slashes.forEach(s=>s.life--);
    slashes=slashes.filter(s=>s.life>0);

    saveGame();
}

function drawBar(x,y,w,h,val,max){
    ctx.fillStyle="red";
    ctx.fillRect(x,y,w,h);
    ctx.fillStyle="lime";
    ctx.fillRect(x,y,w*(val/max),h);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2-player.x, canvas.height/2-player.y);

    obstacles.forEach(o=>{
        ctx.fillStyle="#444";
        ctx.fillRect(o.x,o.y,o.size,o.size);
    });

    ctx.fillStyle="#00ffff";
    ctx.fillRect(player.x,player.y,player.size,player.size);

    enemies.forEach(e=>{
        ctx.fillStyle="#aa0000";
        ctx.fillRect(e.x,e.y,e.size,e.size);
        drawBar(e.x,e.y-8,e.size,5,e.hp,e.maxHp);
    });

    slashes.forEach(s=>{
        ctx.fillStyle="rgba(255,255,0,0.5)";
        ctx.fillRect(s.x,s.y,s.w,s.h);
    });

    ctx.restore();

    ctx.fillStyle="white";
    ctx.fillText("HP:",20,30);
    drawBar(60,18,200,15,player.hp,player.maxHp);
    ctx.fillText("Level: "+player.level,20,60);
    ctx.fillText("XP: "+player.xp+"/"+(player.level*80),20,80);
    ctx.fillText("Gold: "+player.gold,20,100);

    if(player.specialCooldown>0){
        ctx.fillText("Special CD: "+Math.floor(player.specialCooldown/60),20,120);
    }

    if(inventoryOpen){
        ctx.fillStyle="rgba(0,0,0,0.8)";
        ctx.fillRect(200,100,500,400);
        ctx.fillStyle="white";
        ctx.fillText("INVENTÁRIO",400,140);
        ctx.fillText("Gold: "+player.gold,400,180);
    }

    if(player.hp<=0){
        ctx.font="50px Arial";
        ctx.fillText("VOCÊ MORREU",250,300);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
