<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RPG Engine Web</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}
canvas{display:block;margin:auto;background:#0a0a0f}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 1100;
canvas.height = 650;

/* ============================
   GAME STATE SYSTEM
============================ */
let state = "menu";
let keys = {};
window.addEventListener("keydown", e=>keys[e.key]=true);
window.addEventListener("keyup", e=>keys[e.key]=false);

/* ============================
   CORE DATA
============================ */
const WORLD_SIZE = 5000;
let camera = {x:0,y:0};
let enemies=[], particles=[], items=[], texts=[];
let dungeonEnemies=[];
let boss=null;

/* ============================
   PLAYER
============================ */
const player={
x:2500,y:2500,
radius:20,
hp:100,maxHp:100,
level:1,xp:0,
gold:50,
class:"Knight",
speed:4,
direction:0,
cooldowns:{attack:0,skill:0},
stats:{str:5,agi:5,int:5},
weapon:{name:"Iron Sword",damage:10,rarity:"common"},
inventory:[],
quests:[
{title:"Kill 10 enemies",progress:0,goal:10,reward:100,done:false}
]
};

/* ============================
   UTILS
============================ */
function rand(min,max){return Math.random()*(max-min)+min}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)}

function damageText(x,y,value,color="white"){
texts.push({x,y,value,color,life:60});
}

/* ============================
   WORLD GENERATION
============================ */
function generateEnemies(n=40){
for(let i=0;i<n;i++){
enemies.push({
x:rand(0,WORLD_SIZE),
y:rand(0,WORLD_SIZE),
hp:60,
maxHp:60,
speed:1.5,
xp:25
});
}
}
generateEnemies();

/* ============================
   ATTACK
============================ */
function attack(){
if(player.cooldowns.attack>0) return;
player.cooldowns.attack=25;

let damage = player.weapon.damage + player.stats.str*2;

enemies.forEach(e=>{
if(dist(player.x,player.y,e.x,e.y)<100){
e.hp-=damage;
damageText(e.x,e.y,damage,"orange");
}
});

if(boss && dist(player.x,player.y,boss.x,boss.y)<120){
boss.hp-=damage;
damageText(boss.x,boss.y,damage,"red");
}
}

/* ============================
   SKILL SYSTEM
============================ */
function skill(){
if(player.cooldowns.skill>0) return;
player.cooldowns.skill=180;

if(player.class==="Mage"){
enemies.forEach(e=>{
e.hp-=40+player.stats.int*3;
damageText(e.x,e.y,"40","cyan");
});
}

if(player.class==="Knight"){
player.hp=Math.min(player.hp+40,player.maxHp);
}

if(player.class==="Assassin"){
player.speed=8;
setTimeout(()=>player.speed=5,1500);
}
}

/* ============================
   BOSS
============================ */
function spawnBoss(){
boss={
x:2500,y:1000,
hp:1500,
maxHp:1500,
phase:1,
cooldown:120
};
}

/* ============================
   UPDATE
============================ */
function update(){

if(state!=="game" && state!=="dungeon") return;

let dx=0,dy=0;
if(keys["w"]) dy--;
if(keys["s"]) dy++;
if(keys["a"]) dx--;
if(keys["d"]) dx++;

if(dx||dy){
let len=Math.hypot(dx,dy);
dx/=len; dy/=len;
player.x+=dx*player.speed;
player.y+=dy*player.speed;
player.direction=Math.atan2(dy,dx);
}

if(keys[" "]) attack();
if(keys["e"]) skill();

player.cooldowns.attack--;
player.cooldowns.skill--;

let currentEnemies = state==="dungeon"? dungeonEnemies : enemies;

currentEnemies.forEach(e=>{
let d = dist(player.x,player.y,e.x,e.y);
if(d>10){
e.x += (player.x-e.x)/d*e.speed;
e.y += (player.y-e.y)/d*e.speed;
}
if(d<30) player.hp-=0.3;
});

currentEnemies = currentEnemies.filter(e=>{
if(e.hp<=0){
player.xp+=e.xp;
player.quests[0].progress++;
damageText(e.x,e.y,"+XP","yellow");
return false;
}
return true;
});

if(state==="game") enemies=currentEnemies;
else dungeonEnemies=currentEnemies;

if(player.xp>=player.level*100){
player.xp=0;
player.level++;
player.stats.str+=2;
player.stats.agi+=2;
player.stats.int+=2;
player.maxHp+=20;
player.hp=player.maxHp;
}

if(player.level>=5 && !boss) spawnBoss();

if(boss){
let d = dist(player.x,player.y,boss.x,boss.y);
boss.x += (player.x-boss.x)/d*0.8;
boss.y += (player.y-boss.y)/d*0.8;

boss.cooldown--;
if(boss.cooldown<=0){
player.hp-=20;
damageText(player.x,player.y,"20","red");
boss.cooldown=180;
}
if(boss.hp<=0){
player.gold+=500;
boss=null;
}
}

texts.forEach(t=>{t.y-=0.5;t.life--;});
texts=texts.filter(t=>t.life>0);

camera.x+=(player.x-canvas.width/2-camera.x)*0.1;
camera.y+=(player.y-canvas.height/2-camera.y)*0.1;

if(player.hp<=0){
player.hp=player.maxHp;
player.x=2500;
player.y=2500;
}
}

/* ============================
   DRAW
============================ */
function drawPlayer(){
ctx.save();
ctx.translate(player.x,player.y);
ctx.rotate(player.direction);
ctx.fillStyle="#00e5ff";
ctx.beginPath();
ctx.moveTo(20,0);
ctx.lineTo(-15,12);
ctx.lineTo(-10,0);
ctx.lineTo(-15,-12);
ctx.closePath();
ctx.fill();
ctx.restore();
}

function drawEnemies(list){
list.forEach(e=>{
ctx.fillStyle="crimson";
ctx.beginPath();
ctx.arc(e.x,e.y,15,0,Math.PI*2);
ctx.fill();
});
}

function drawBoss(){
if(!boss) return;
ctx.fillStyle="purple";
ctx.beginPath();
ctx.arc(boss.x,boss.y,60,0,Math.PI*2);
ctx.fill();
}

function drawUI(){
ctx.fillStyle="white";
ctx.fillText("HP: "+Math.floor(player.hp),20,20);
ctx.fillText("Level: "+player.level,20,40);
ctx.fillText("Gold: "+player.gold,20,60);
ctx.fillText("Quest: "+player.quests[0].progress+"/"+player.quests[0].goal,20,80);

ctx.fillStyle="red";
ctx.fillRect(20,90,200*(player.hp/player.maxHp),10);

ctx.fillStyle="purple";
ctx.fillRect(20,105,200*(player.xp/(player.level*100)),8);

ctx.fillStyle="cyan";
ctx.fillRect(20,120,200*(player.cooldowns.skill/180),6);
}

function drawTexts(){
texts.forEach(t=>{
ctx.fillStyle=t.color;
ctx.fillText(t.value,t.x,t.y);
});
}

function drawWorld(){
ctx.fillStyle="#101025";
ctx.fillRect(0,0,WORLD_SIZE,WORLD_SIZE);
}

/* ============================
   LOOP
============================ */
function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="menu"){
ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("RPG ENGINE WEB",350,250);
ctx.font="20px Arial";
ctx.fillText("Press ENTER to start",430,300);
if(keys["Enter"]) state="game";
}
else{
update();
ctx.save();
ctx.translate(-camera.x,-camera.y);

drawWorld();
drawPlayer();
drawEnemies(state==="dungeon"?dungeonEnemies:enemies);
drawBoss();
drawTexts();

ctx.restore();
drawUI();
}

requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
