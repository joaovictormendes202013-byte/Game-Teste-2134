<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RPG Visual Upgrade</title>
<style>
body { margin:0; overflow:hidden; background:#0f0f0f; }
canvas { display:block; margin:auto; background:#181818; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 600;

const keys = {};
let enemies = [];
let slashes = [];
let specialEffects = [];

const player = {
    x: 400,
    y: 300,
    radius: 20,
    speed: 4,
    hp: 100,
    maxHp: 100,
    level: 1,
    direction: 0, // radianos
    attackCooldown: 0,
    specialCooldown: 0
};

window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function spawnEnemy(){
    enemies.push({
        x: Math.random()*2000,
        y: Math.random()*2000,
        radius: 18,
        hp: 60,
        maxHp: 60,
        speed: 1.5
    });
}

for(let i=0;i<15;i++) spawnEnemy();

function attack(){
    if(player.attackCooldown>0) return;
    player.attackCooldown=25;

    slashes.push({
        x: player.x,
        y: player.y,
        angle: player.direction,
        life: 12,
        maxLife: 12
    });

    enemies.forEach(e=>{
        const dx=e.x-player.x;
        const dy=e.y-player.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<90){
            e.hp-=20+player.level*3;
        }
    });
}

function special(){
    if(player.specialCooldown>0) return;
    player.specialCooldown=300;

    specialEffects.push({
        x: player.x,
        y: player.y,
        radius: 0,
        maxRadius: 200
    });

    enemies.forEach(e=>{
        const dx=e.x-player.x;
        const dy=e.y-player.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<200){
            e.hp-=50;
        }
    });
}

function update(){

    let dx=0,dy=0;

    if(keys["w"]) dy-=1;
    if(keys["s"]) dy+=1;
    if(keys["a"]) dx-=1;
    if(keys["d"]) dx+=1;

    if(dx!==0 || dy!==0){
        const len=Math.sqrt(dx*dx+dy*dy);
        dx/=len; dy/=len;
        player.x+=dx*player.speed;
        player.y+=dy*player.speed;
        player.direction=Math.atan2(dy,dx);
    }

    if(keys[" "]) attack();
    if(keys["e"]) special();

    if(player.attackCooldown>0) player.attackCooldown--;
    if(player.specialCooldown>0) player.specialCooldown--;

    enemies.forEach(e=>{
        const dx=player.x-e.x;
        const dy=player.y-e.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>5){
            e.x+=dx/dist*e.speed;
            e.y+=dy/dist*e.speed;
        }
        if(dist<30) player.hp-=0.2;
    });

    enemies=enemies.filter(e=>{
        if(e.hp<=0){ spawnEnemy(); return false;}
        return true;
    });

    slashes.forEach(s=>s.life--);
    slashes=slashes.filter(s=>s.life>0);

    specialEffects.forEach(s=>{
        s.radius+=15;
    });
    specialEffects=specialEffects.filter(s=>s.radius<s.maxRadius);
}

function drawPlayer(){
    ctx.save();
    ctx.translate(player.x,player.y);

    // corpo
    ctx.fillStyle="#00e5ff";
    ctx.beginPath();
    ctx.arc(0,0,player.radius,0,Math.PI*2);
    ctx.fill();

    // arma apontando
    ctx.rotate(player.direction);
    ctx.strokeStyle="white";
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(30,0);
    ctx.stroke();

    ctx.restore();
}

function drawEnemy(e){
    ctx.fillStyle="#ff4444";
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
    ctx.fill();

    // olho
    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(e.x+5,e.y-5,5,0,Math.PI*2);
    ctx.fill();

    // barra hp
    ctx.fillStyle="red";
    ctx.fillRect(e.x-20,e.y-30,40,5);
    ctx.fillStyle="lime";
    ctx.fillRect(e.x-20,e.y-30,40*(e.hp/e.maxHp),5);
}

function drawSlash(s){
    const progress=s.life/s.maxLife;
    ctx.save();
    ctx.translate(s.x,s.y);
    ctx.rotate(s.angle);

    ctx.strokeStyle="rgba(255,255,0,"+progress+")";
    ctx.lineWidth=8;
    ctx.beginPath();
    ctx.arc(0,0,60,-0.5,0.5);
    ctx.stroke();

    ctx.restore();
}

function drawSpecial(s){
    ctx.strokeStyle="rgba(0,150,255,0.6)";
    ctx.lineWidth=5;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
    ctx.stroke();
}

function drawUI(){
    ctx.fillStyle="white";
    ctx.fillText("HP:",20,30);
    ctx.fillStyle="red";
    ctx.fillRect(60,20,200,15);
    ctx.fillStyle="lime";
    ctx.fillRect(60,20,200*(player.hp/player.maxHp),15);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawPlayer();
    enemies.forEach(drawEnemy);
    slashes.forEach(drawSlash);
    specialEffects.forEach(drawSpecial);
    drawUI();
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
